<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Variable City XR — a premium 6th-grade learning game for independent and dependent variables." />
  <title>Variable City XR</title>
  <style>
    :root{
      --bg:#06131f;
      --bg-2:#0a1b2b;
      --panel:rgba(10,24,40,.82);
      --panel-2:rgba(12,32,52,.92);
      --glass:rgba(255,255,255,.08);
      --line:rgba(151,205,255,.16);
      --text:#eef8ff;
      --muted:#9db6cb;
      --accent:#44c2ff;
      --accent-2:#5ef2c3;
      --accent-3:#ffd56b;
      --accent-4:#ff8ca3;
      --danger:#ff6d86;
      --ok:#65efbe;
      --shadow:0 24px 70px rgba(0,0,0,.38);
      --radius-xl:30px;
      --radius-lg:24px;
      --radius-md:18px;
      --font-ui:Inter,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
      --font-display:Inter,system-ui,-apple-system,"Segoe UI",sans-serif;
      --scene-tilt-x:10deg;
      --scene-tilt-y:-8deg;
      --cam-x:0px;
      --cam-y:0px;
      --glow:0 0 0 rgba(0,0,0,0);
    }

    *{box-sizing:border-box}
    html,body{height:100%;margin:0}
    body{
      font-family:var(--font-ui);
      color:var(--text);
      background:
        radial-gradient(circle at 15% 12%, rgba(68,194,255,.12), transparent 18%),
        radial-gradient(circle at 85% 12%, rgba(94,242,195,.09), transparent 16%),
        linear-gradient(180deg,#07121d 0%, #081827 24%, #071523 100%);
      overflow-x:hidden;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background:
        linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
      background-size:36px 36px;
      mask-image:linear-gradient(180deg, transparent, #000 12%, #000 88%, transparent);
      opacity:.35;
    }

    .stars{
      position:fixed; inset:0; pointer-events:none; overflow:hidden; z-index:0;
    }
    .stars span{
      position:absolute; width:2px; height:2px; border-radius:50%;
      background:rgba(255,255,255,.8);
      box-shadow:0 0 12px rgba(255,255,255,.75);
      animation:starPulse linear infinite;
    }

    .app{
      position:relative;
      z-index:2;
      width:min(1480px, calc(100% - 28px));
      margin:0 auto;
      padding:22px 0 34px;
    }

    .hero{
      position:relative;
      overflow:hidden;
      border-radius:var(--radius-xl);
      border:1px solid var(--line);
      background:
        radial-gradient(circle at 80% 15%, rgba(68,194,255,.18), transparent 20%),
        radial-gradient(circle at 18% 15%, rgba(94,242,195,.14), transparent 20%),
        linear-gradient(180deg, rgba(14,34,56,.96), rgba(10,24,40,.98));
      box-shadow:var(--shadow);
      padding:26px;
    }

    .hero::after{
      content:"";
      position:absolute;
      right:-120px; top:-40px;
      width:360px; height:360px;
      border-radius:48px;
      background:
        linear-gradient(145deg, rgba(68,194,255,.24), rgba(94,242,195,.10)),
        radial-gradient(circle at 30% 24%, rgba(255,255,255,.22), transparent 34%);
      transform:perspective(1100px) rotateY(-28deg) rotateX(12deg);
      border:1px solid rgba(255,255,255,.12);
      box-shadow:0 36px 90px rgba(16,110,170,.22);
      animation:heroFloat 8s ease-in-out infinite;
      filter:blur(.2px);
    }

    .hero-grid{
      position:relative;
      z-index:1;
      display:grid;
      grid-template-columns:1.15fr .85fr;
      gap:20px;
      align-items:center;
    }

    .eyebrow{
      display:inline-flex; align-items:center; gap:8px;
      padding:8px 12px; border-radius:999px;
      background:rgba(94,242,195,.10);
      border:1px solid rgba(94,242,195,.24);
      color:#9cf2d7; font-size:12px; font-weight:800;
      text-transform:uppercase; letter-spacing:.12em;
    }

    h1{
      margin:16px 0 10px;
      font-family:var(--font-display);
      font-size:clamp(44px,7vw,86px);
      line-height:.92;
      letter-spacing:-.06em;
      max-width:8.6ch;
    }

    .hero-copy{
      margin:0;
      max-width:66ch;
      color:var(--muted);
      font-size:15px;
      line-height:1.65;
    }

    .hero-actions,.hero-stats,.mini-badges,.mission-tags,.footer-tags,.scene-kpis,.system-tags,.status-row{
      display:flex; flex-wrap:wrap; gap:12px;
    }
    .hero-actions{margin-top:20px}

    .stat,.chip,.tag,.badge{
      border-radius:18px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.05);
      backdrop-filter:blur(16px);
    }

    .stat{
      padding:16px;
      min-width:130px;
      flex:1;
      background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.04));
    }

    .stat-label{
      font-size:11px; text-transform:uppercase; letter-spacing:.14em; color:var(--muted);
    }

    .stat-value{
      display:block; margin-top:7px; font-size:30px; font-weight:900;
    }

    .system-bar{
      margin-top:22px;
      display:grid;
      grid-template-columns:repeat(3,minmax(0,1fr));
      gap:14px;
    }

    .system-card{
      padding:16px 16px 14px;
      border-radius:20px;
      border:1px solid var(--line);
      background:linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.04));
      box-shadow:0 10px 24px rgba(0,0,0,.14);
    }
    .system-card strong{
      display:block; margin-bottom:6px; font-size:15px;
    }

    .main-grid{
      display:grid;
      grid-template-columns:330px 1fr;
      gap:22px;
      margin-top:22px;
      align-items:start;
    }

    .sidebar{
      display:grid; gap:22px; position:sticky; top:16px;
    }

    .panel{
      position:relative;
      overflow:hidden;
      border-radius:var(--radius-lg);
      border:1px solid var(--line);
      background:linear-gradient(180deg, var(--panel), var(--panel-2));
      box-shadow:var(--shadow);
    }

    .panel-inner{padding:20px}
    .panel h2,.panel h3,.panel h4{margin:0 0 12px; letter-spacing:-.02em}

    .small{
      color:var(--muted);
      font-size:13px;
      line-height:1.55;
    }

    .progress-shell{
      margin-top:12px;
      height:12px;
      border-radius:999px;
      background:rgba(255,255,255,.06);
      overflow:hidden;
      border:1px solid rgba(255,255,255,.04);
    }

    .progress-fill{
      height:100%;
      background:linear-gradient(90deg, var(--accent-2), var(--accent), var(--accent-3));
      transition:width .35s ease;
      box-shadow:0 0 26px rgba(68,194,255,.34);
    }

    .mission-list{display:grid; gap:12px; margin-top:14px}
    .mission{
      padding:15px;
      border-radius:18px;
      border:1px solid var(--line);
      background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.03));
      transition:transform .18s ease, border-color .18s ease, box-shadow .18s ease, background .18s ease;
      cursor:pointer;
    }
    .mission:hover,.mission.active{
      transform:translateY(-2px);
      border-color:rgba(68,194,255,.38);
      box-shadow:0 16px 30px rgba(0,0,0,.24), 0 0 0 1px rgba(68,194,255,.10) inset;
      background:linear-gradient(180deg, rgba(68,194,255,.10), rgba(255,255,255,.04));
    }
    .mission.locked{opacity:.46; cursor:not-allowed}

    .mission-title{
      display:flex; justify-content:space-between; gap:10px; align-items:center;
      font-size:15px; font-weight:800; margin-bottom:7px;
    }

    .screen-stack,.overview-grid,.city-stage,.footer-grid{
      display:grid; gap:22px;
    }

    .overview-grid{grid-template-columns:1.18fr .82fr}
    .city-stage{grid-template-columns:1fr 340px; gap:18px}

    .scene-wrap{
      display:grid;
      gap:16px;
    }

    .scene{
      position:relative;
      min-height:520px;
      overflow:hidden;
      border-radius:26px;
      border:1px solid rgba(143,205,255,.16);
      background:
        radial-gradient(circle at 52% 11%, rgba(255,227,161,.24), transparent 14%),
        radial-gradient(circle at 50% 25%, rgba(68,194,255,.11), transparent 26%),
        linear-gradient(180deg, #17345b 0%, #102845 28%, #0b1b31 56%, #07131f 100%);
      perspective:1500px;
      transform-style:preserve-3d;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.06);
    }

    .scene::after{
      content:"";
      position:absolute;
      left:-20%; top:-10%;
      width:28%; height:120%;
      background:linear-gradient(90deg, transparent, rgba(255,255,255,.11), transparent);
      transform:skewX(-16deg) translateX(-180%);
      animation:scannerSweep 8s ease-in-out infinite;
      pointer-events:none;
    }

    .scene-world{
      position:absolute; inset:0;
      transform-style:preserve-3d;
      transform:
        rotateX(var(--scene-tilt-x))
        rotateY(var(--scene-tilt-y))
        translateX(var(--cam-x))
        translateY(var(--cam-y));
      transition:transform .22s ease-out;
    }

    .sky-glow{
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at var(--sun-x,74%) var(--sun-y,18%), rgba(255,218,123,.85), rgba(255,218,123,.12) 18%, transparent 26%),
        radial-gradient(circle at 18% 16%, rgba(94,242,195,.10), transparent 18%);
      transform:translateZ(-140px);
      transition:all .28s linear;
    }

    .aurora{
      position:absolute; inset:0;
      background:
        radial-gradient(circle at 20% 34%, rgba(94,242,195,.12), transparent 18%),
        radial-gradient(circle at 70% 26%, rgba(68,194,255,.14), transparent 18%);
      filter:blur(24px);
      opacity:.8;
      transform:translateZ(-120px);
      animation:auroraShift 12s ease-in-out infinite alternate;
    }

    .cloud-layer,.particles,.billboard-layer,.lane-layer,.sky-traffic,.rings-layer,.drone-layer,.city-bg,.city-mid,.city-front,.avatar-layer,.hud-layer{
      position:absolute; inset:0;
      transform-style:preserve-3d;
    }

    .cloud{
      position:absolute;
      width:150px; height:56px; border-radius:999px;
      background:rgba(255,255,255,.14);
      box-shadow:42px 8px 0 8px rgba(255,255,255,.12), 84px -4px 0 0 rgba(255,255,255,.11);
      filter:blur(.2px);
      animation:cloudDrift linear infinite;
    }

    .cloud.c1{top:13%; left:-220px; transform:translateZ(-90px) scale(1.1); animation-duration:22s}
    .cloud.c2{top:20%; left:-260px; transform:translateZ(-120px) scale(.82); opacity:.7; animation-duration:28s; animation-delay:-7s}
    .cloud.c3{top:29%; left:-280px; transform:translateZ(-80px) scale(.95); opacity:.68; animation-duration:32s; animation-delay:-14s}

    .ring{
      position:absolute; left:50%; top:46%;
      border-radius:50%;
      border:1px solid rgba(170,228,255,.18);
      transform-style:preserve-3d;
    }
    .ring.r1{width:250px; height:250px; margin:-125px 0 0 -125px; transform:translateZ(30px) rotateX(72deg); opacity:.55}
    .ring.r2{width:360px; height:360px; margin:-180px 0 0 -180px; transform:translateZ(60px) rotateX(72deg); opacity:.3; animation:orbitSpin 12s linear infinite}
    .ring.r3{width:460px; height:460px; margin:-230px 0 0 -230px; transform:translateZ(-10px) rotateX(72deg); opacity:.18; animation:orbitSpin 18s linear reverse infinite}

    .particle{
      position:absolute; width:10px; height:10px; border-radius:50%;
      background:radial-gradient(circle, rgba(255,255,255,.95), rgba(94,242,195,.85));
      box-shadow:0 0 22px rgba(94,242,195,.58);
      animation:pulseNode 2.8s ease-in-out infinite;
    }

    .city-bg,.city-mid,.city-front{bottom:120px; height:250px}
    .city-bg{transform:translateZ(-60px)}
    .city-mid{transform:translateZ(10px)}
    .city-front{transform:translateZ(70px)}

    .skyline{
      position:absolute; inset:auto 0 0 0;
      display:flex; align-items:flex-end; justify-content:space-evenly;
      gap:10px; padding:0 16px;
    }

    .tower{
      position:relative;
      width:12%;
      min-width:44px;
      border-radius:18px 18px 0 0;
      border:1px solid rgba(180,228,255,.16);
      overflow:hidden;
      transform-origin:bottom center;
      transition:height .28s ease, filter .22s ease;
    }

    .city-bg .tower{
      background:linear-gradient(180deg, rgba(39,86,137,.86), rgba(20,48,82,.92));
      box-shadow:0 8px 18px rgba(0,0,0,.22);
    }
    .city-mid .tower{
      background:linear-gradient(180deg, rgba(54,134,212,.78), rgba(27,69,114,.94));
      box-shadow:0 14px 22px rgba(0,0,0,.26);
    }
    .city-front .tower{
      background:linear-gradient(180deg, rgba(92,211,255,.24), rgba(43,119,195,.46) 22%, rgba(18,47,81,.96));
      box-shadow:0 16px 28px rgba(0,0,0,.28), 0 0 24px rgba(68,194,255,.08);
      border-color:rgba(180,228,255,.22);
    }

    .tower::before{
      content:"";
      position:absolute; inset:8px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.12), transparent 16%),
        linear-gradient(90deg, rgba(255,255,255,.10) 1px, transparent 1px),
        linear-gradient(rgba(255,255,255,.08) 1px, transparent 1px);
      background-size:100% 100%, 18px 18px, 18px 18px;
      opacity:.7;
    }
    .tower::after{
      content:"";
      position:absolute; inset:0;
      background:linear-gradient(180deg, rgba(255,255,255,.12), transparent 40%);
      opacity:.5;
      pointer-events:none;
    }

    .billboard{
      position:absolute;
      width:120px; height:72px;
      border-radius:16px;
      border:1px solid rgba(160,228,255,.24);
      background:linear-gradient(180deg, rgba(10,30,48,.9), rgba(8,22,36,.96));
      box-shadow:0 0 26px rgba(68,194,255,.18);
      transform-style:preserve-3d;
      transform:translateZ(100px);
      overflow:hidden;
    }
    .billboard::before{
      content:"";
      position:absolute; inset:8px;
      border-radius:12px;
      background:linear-gradient(135deg, rgba(94,242,195,.22), rgba(68,194,255,.32));
      box-shadow:inset 0 0 20px rgba(68,194,255,.14);
    }
    .billboard::after{
      content:attr(data-label);
      position:absolute; inset:0;
      display:grid; place-items:center;
      font-size:12px; font-weight:900; letter-spacing:.12em; text-transform:uppercase;
      color:#dff7ff;
    }

    .road-grid{
      position:absolute;
      inset:auto -12% -4% -12%;
      height:56%;
      background:
        linear-gradient(rgba(148,222,255,.12) 1px, transparent 1px),
        linear-gradient(90deg, rgba(148,222,255,.12) 1px, transparent 1px);
      background-size:54px 54px;
      transform:translateZ(14px) rotateX(80deg) translateY(120px);
      opacity:.52;
      animation:gridDrift 9s linear infinite;
    }

    .road{
      position:absolute;
      left:6%; right:6%; bottom:0;
      height:188px;
      transform:translateZ(35px) rotateX(78deg) translateY(72px);
      background:
        linear-gradient(90deg, transparent 0 8%, rgba(255,255,255,.22) 8% 8.5%, transparent 8.5% 24%, rgba(255,255,255,.22) 24% 24.5%, transparent 24.5% 40%, rgba(255,255,255,.22) 40% 40.5%, transparent 40.5% 56%, rgba(255,255,255,.22) 56% 56.5%, transparent 56.5% 72%, rgba(255,255,255,.22) 72% 72.5%, transparent 72.5% 100%),
        linear-gradient(180deg, rgba(7,17,28,.16), rgba(7,17,28,.92));
      border:1px solid rgba(255,255,255,.06);
      border-radius:18px;
      overflow:hidden;
    }

    .lane-light{
      position:absolute;
      bottom:72px;
      width:22%;
      height:4px;
      border-radius:999px;
      background:linear-gradient(90deg, transparent, rgba(68,194,255,.98), rgba(94,242,195,.92), transparent);
      filter:blur(.5px);
      animation:laneSweep linear infinite;
      opacity:.82;
    }

    .sky-ship{
      position:absolute;
      width:132px; height:18px;
      border-radius:999px;
      background:linear-gradient(90deg, transparent, rgba(255,213,107,.95), rgba(68,194,255,.92), transparent);
      filter:blur(1px);
      transform:translateZ(80px);
      animation:skyShip linear infinite;
      opacity:.82;
    }

    .drone{
      position:absolute;
      width:118px; height:64px;
      transform:translateZ(132px);
      animation:hoverFloat 4.6s ease-in-out infinite;
    }
    .drone::before,.drone::after{
      content:"";
      position:absolute;
      inset:0;
      border-radius:18px;
      border:1px solid rgba(94,242,195,.34);
      background:linear-gradient(145deg, rgba(94,242,195,.18), rgba(68,194,255,.10));
      box-shadow:0 0 18px rgba(68,194,255,.16);
    }
    .drone::after{
      inset:16px 10px;
      background:linear-gradient(145deg, rgba(255,255,255,.24), transparent);
    }

    .avatar{
      position:absolute;
      left:9%; bottom:64px;
      width:146px; height:188px;
      transform:translateZ(150px);
      animation:pilotBounce 3.4s ease-in-out infinite;
      filter:drop-shadow(0 16px 16px rgba(0,0,0,.24));
    }
    .avatar .head,.avatar .body,.avatar .arm,.avatar .leg,.avatar .visor{
      position:absolute;
      background:linear-gradient(180deg, #6ef0ca, #4dc8ff);
    }
    .avatar .head{width:56px;height:56px;border-radius:50%;left:45px;top:0}
    .avatar .visor{width:42px;height:18px;border-radius:999px;left:52px;top:20px;background:linear-gradient(90deg,#dff9ff,#7fe4ff)}
    .avatar .body{width:80px;height:88px;border-radius:26px;left:33px;top:50px}
    .avatar .arm{width:22px;height:82px;border-radius:14px;top:60px}
    .avatar .arm.left{left:10px;transform:rotate(18deg)}
    .avatar .arm.right{right:10px;transform:rotate(-18deg)}
    .avatar .leg{width:24px;height:78px;border-radius:14px;top:118px}
    .avatar .leg.left{left:46px}
    .avatar .leg.right{right:46px}
    .avatar-shadow{
      position:absolute;
      left:10%; bottom:52px;
      width:120px; height:22px;
      border-radius:50%;
      background:rgba(0,0,0,.28);
      filter:blur(8px);
      transform:translateZ(6px);
    }

    .holo-card{
      position:absolute;
      right:18px; top:18px;
      min-width:180px;
      padding:11px 13px;
      border-radius:16px;
      border:1px solid rgba(190,230,255,.18);
      background:linear-gradient(180deg, rgba(7,24,38,.78), rgba(10,28,44,.86));
      box-shadow:0 0 24px rgba(68,194,255,.08);
      backdrop-filter:blur(12px);
      transform:translateZ(160px);
    }

    .scene-label{
      position:absolute;
      left:18px; top:18px;
      padding:10px 14px;
      border-radius:14px;
      border:1px solid rgba(190,230,255,.18);
      background:rgba(8,26,41,.78);
      font-size:12px; font-weight:800; letter-spacing:.1em; text-transform:uppercase;
      color:#dff6ff;
      transform:translateZ(160px);
    }

    .scene-kpis{
      position:absolute;
      right:18px; bottom:18px;
      justify-content:flex-end;
      max-width:70%;
      transform:translateZ(160px);
    }

    .tag{
      padding:8px 11px;
      font-size:12px;
      font-weight:800;
      color:#dff6ff;
      background:rgba(255,255,255,.06);
    }

    .scene-bottom{
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:12px;
    }

    .mini-panel{
      padding:14px;
      border-radius:18px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.05);
    }

    .control-card,.feedback,.mini-item,.output,.quiz-card,.future-card,.insight-card,.challenge-card,.debrief-card{
      border-radius:20px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.05);
    }
    .control-card{padding:18px}

    .slider-row{
      display:flex; justify-content:space-between; gap:10px; align-items:end; margin-bottom:10px;
    }

    .meter{
      margin-top:12px;
      display:grid;
      gap:10px;
    }

    .meter-line{
      position:relative;
      height:10px;
      border-radius:999px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.04);
      overflow:hidden;
    }
    .meter-line span{
      display:block;
      height:100%;
      border-radius:999px;
      background:linear-gradient(90deg,var(--accent-2),var(--accent),var(--accent-3));
      box-shadow:0 0 22px rgba(68,194,255,.26);
      transition:width .25s ease;
    }

    input[type="range"]{
      width:100%;
      accent-color:var(--accent);
    }
    .axis{
      display:flex; justify-content:space-between; color:var(--muted); font-size:12px; margin-top:6px;
    }

    .output-grid,.choice-grid,.debrief-grid,.coach-grid{
      display:grid; gap:12px;
    }
    .output-grid{grid-template-columns:repeat(3,minmax(0,1fr)); margin-top:16px}
    .choice-grid{grid-template-columns:repeat(2,minmax(0,1fr)); margin-top:12px}
    .debrief-grid{grid-template-columns:1fr 1fr; margin-top:14px}
    .coach-grid{grid-template-columns:repeat(3,minmax(0,1fr)); margin-top:12px}

    .output{padding:14px}
    .output span{
      display:block; font-size:11px; text-transform:uppercase; letter-spacing:.14em; color:var(--muted);
    }
    .output strong{
      display:block; margin-top:6px; font-size:22px;
    }

    .feedback{
      margin-top:16px;
      min-height:66px;
      padding:14px 16px;
      line-height:1.5;
    }
    .feedback.good{
      border-color:rgba(101,239,190,.28);
      background:rgba(101,239,190,.10);
      box-shadow:0 0 0 1px rgba(101,239,190,.06) inset;
    }
    .feedback.bad{
      border-color:rgba(255,109,134,.24);
      background:rgba(255,109,134,.10);
    }

    .graph{
      margin-top:14px;
      height:280px;
      border-radius:20px;
      border:1px solid rgba(255,255,255,.08);
      background:
        linear-gradient(rgba(255,255,255,.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.06) 1px, transparent 1px),
        radial-gradient(circle at 60% 20%, rgba(68,194,255,.08), transparent 24%),
        linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,.01));
      background-size:36px 36px, 36px 36px, 100% 100%, 100% 100%;
      overflow:hidden;
    }
    .graph svg{width:100%; height:100%}

    .graph-legend{
      display:flex; justify-content:space-between; gap:12px; flex-wrap:wrap;
      margin-top:10px; color:var(--muted); font-size:12px;
    }

    .mini-list{
      display:grid; gap:10px; margin-top:14px;
    }
    .mini-item,.challenge-card,.debrief-card,.insight-card,.future-card,.quiz-card{padding:16px}
    .mini-item strong,.challenge-card strong,.debrief-card strong{
      display:block; margin-bottom:5px;
    }

    .mission-complete{
      position:relative;
      overflow:hidden;
      padding:18px;
      border-radius:22px;
      border:1px solid rgba(101,239,190,.24);
      background:linear-gradient(135deg, rgba(101,239,190,.12), rgba(68,194,255,.08));
      box-shadow:0 18px 32px rgba(0,0,0,.16);
    }

    .confetti{
      position:absolute; inset:0; pointer-events:none; overflow:hidden;
    }
    .confetti span{
      position:absolute; top:-12px; width:10px; height:18px;
      border-radius:999px; opacity:.82; animation:confettiFall linear infinite;
    }

    .status-pill{
      padding:8px 12px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.05);
      font-size:12px; font-weight:800;
      color:#dff7ff;
    }

    .coach{
      padding:13px;
      border-radius:16px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.04);
    }
    .coach b{display:block; margin-bottom:4px}

    button{
      border:0;
      cursor:pointer;
      padding:13px 16px;
      border-radius:16px;
      font:800 14px var(--font-ui);
      color:var(--text);
      background:linear-gradient(145deg, rgba(68,194,255,.16), rgba(94,242,195,.14));
      border:1px solid rgba(255,255,255,.08);
      box-shadow:0 14px 30px rgba(0,0,0,.16);
      transition:transform .18s ease, box-shadow .18s ease, opacity .18s ease, background .18s ease;
    }
    button:hover:not(:disabled){
      transform:translateY(-2px);
      box-shadow:0 18px 34px rgba(0,0,0,.26), 0 0 0 1px rgba(68,194,255,.08) inset;
    }
    button:disabled{opacity:.54; cursor:not-allowed}
    .primary{background:linear-gradient(145deg, rgba(94,242,195,.20), rgba(68,194,255,.24))}
    .ghost{background:rgba(255,255,255,.06)}
    .danger{background:linear-gradient(145deg, rgba(255,109,134,.16), rgba(255,213,107,.12))}
    .choice.correct{
      border-color:rgba(101,239,190,.34);
      background:rgba(101,239,190,.12);
    }
    .choice.wrong{
      border-color:rgba(255,109,134,.28);
      background:rgba(255,109,134,.12);
    }

    .sr-only{
      position:absolute; width:1px; height:1px; padding:0; margin:-1px;
      overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; border:0;
    }

    @keyframes heroFloat{
      0%,100%{transform:perspective(1100px) rotateY(-28deg) rotateX(12deg) translateY(0)}
      50%{transform:perspective(1100px) rotateY(-22deg) rotateX(9deg) translateY(-10px)}
    }
    @keyframes hoverFloat{
      0%,100%{transform:translateZ(132px) translateY(0) rotate(-8deg)}
      50%{transform:translateZ(132px) translateY(-12px) rotate(-3deg)}
    }
    @keyframes pilotBounce{
      0%,100%{transform:translateZ(150px) translateY(0)}
      50%{transform:translateZ(150px) translateY(-8px)}
    }
    @keyframes cloudDrift{from{transform:translateX(0)}to{transform:translateX(calc(100vw + 420px))}}
    @keyframes gridDrift{from{transform:translateZ(14px) rotateX(80deg) translateY(120px) translateX(0)}to{transform:translateZ(14px) rotateX(80deg) translateY(120px) translateX(-54px)}}
    @keyframes orbitSpin{from{transform:translateZ(60px) rotateX(72deg) rotateZ(0)}to{transform:translateZ(60px) rotateX(72deg) rotateZ(360deg)}}
    @keyframes pulseNode{0%,100%{transform:scale(1);opacity:.75}50%{transform:scale(1.22);opacity:1}}
    @keyframes scannerSweep{0%,100%{transform:skewX(-16deg) translateX(-180%);opacity:0}20%{opacity:.22}60%{transform:skewX(-16deg) translateX(520%);opacity:.32}80%{opacity:0}}
    @keyframes confettiFall{0%{transform:translateY(0) rotate(0);opacity:0}10%{opacity:1}100%{transform:translateY(240px) rotate(240deg);opacity:0}}
    @keyframes laneSweep{0%{transform:translateX(-160%) scaleX(.7)}100%{transform:translateX(720%) scaleX(1.05)}}
    @keyframes skyShip{0%{transform:translateX(-220%) translateZ(80px)}100%{transform:translateX(700%) translateZ(80px)}}
    @keyframes starPulse{0%,100%{opacity:.2; transform:scale(1)}50%{opacity:.95; transform:scale(1.5)}}
    @keyframes auroraShift{0%{transform:translateX(-1.5%) translateY(0)}100%{transform:translateX(1.5%) translateY(1%)}}

    @media (max-width:1200px){
      .hero-grid,.main-grid,.overview-grid,.city-stage,.footer-grid,.system-bar,.scene-bottom,.coach-grid{grid-template-columns:1fr}
      .sidebar{position:static}
    }

    @media (max-width:760px){
      .app{width:min(100% - 16px, 1480px)}
      .hero{padding:18px}
      h1{font-size:52px}
      .choice-grid,.output-grid,.debrief-grid{grid-template-columns:1fr}
      .scene{min-height:460px}
      .scene-kpis{max-width:100%}
      .avatar{left:4%; transform:translateZ(120px) scale(.88)}
      .holo-card{min-width:auto; max-width:60%}
    }
  </style>
</head>
<body>
  <div class="stars" id="stars"></div>
  <div id="liveRegion" class="sr-only" aria-live="polite" aria-atomic="true"></div>
  <main class="app" id="app"></main>

  <script>
    "use strict";

    const STORAGE_KEY = "variable-city-xr-save-v1";

    const MISSIONS = [
      {
        id:"solar-garden",
        district:"Neon Greenhouse",
        title:"Solar Garden Lift-Off",
        description:"Control sunlight time and watch plant height respond across the greenhouse skyline.",
        independentLabel:"Hours of sunlight",
        dependentLabel:"Plant height",
        unitIndependent:"hours",
        unitDependent:"cm",
        min:1, max:10, step:1, base:8, factor:3,
        heroMetric:"plants powered",
        sceneMode:"sun",
        narrative:"Mayor Nova needs one clean experiment to relight the greenhouse dome and prove the city can model cause and effect.",
        prompts:[
          "How did the city change when the input increased?",
          "Why is plant height the output instead of the input?"
        ],
        quiz:[
          {id:"q1",prompt:"Which variable is independent?",choices:["Hours of sunlight","Plant height","Both are dependent","Neither"],answer:0,explain:"The independent variable is the one you choose and change on purpose."},
          {id:"q2",prompt:"Which variable changes because of the sunlight?",choices:["Plant height","The scientist's badge","The district title","The graph paper"],answer:0,explain:"Plant height depends on the number of sunlight hours."}
        ]
      },
      {
        id:"rocket-ramp",
        district:"Skyport Seven",
        title:"Rocket Scooter Test",
        description:"Change launch power and see jump distance reshape the transit towers and traffic lanes.",
        independentLabel:"Launch power",
        dependentLabel:"Jump distance",
        unitIndependent:"%",
        unitDependent:"m",
        min:10, max:100, step:10, base:2, factor:0.14,
        heroMetric:"meters cleared",
        sceneMode:"speed",
        narrative:"The delivery squad cannot approve the new air-ramp until your model proves the relationship between power and distance.",
        prompts:[
          "What stayed under your control during the test?",
          "What evidence shows distance depends on power?"
        ],
        quiz:[
          {id:"q1",prompt:"What is the dependent variable?",choices:["Launch power","Jump distance","The scooter color","The tester name"],answer:1,explain:"Jump distance changes because launch power changes."},
          {id:"q2",prompt:"If launch power drops, what likely happens?",choices:["Distance becomes independent","Distance probably drops too","Nothing can change","The graph disappears"],answer:1,explain:"The output reacts to the input, so lower power usually means lower distance in this model."}
        ]
      },
      {
        id:"smoothie-lab",
        district:"Flavor Engine",
        title:"Smoothie Lab Rush",
        description:"Adjust puree cups and watch servings expand through the food-tech district.",
        independentLabel:"Cups of fruit puree",
        dependentLabel:"Smoothie servings",
        unitIndependent:"cups",
        unitDependent:"servings",
        min:1, max:8, step:1, base:1, factor:2,
        heroMetric:"snacks served",
        sceneMode:"production",
        narrative:"The robotics café placed a huge order. Your model needs to show what the kitchen controls and what responds.",
        prompts:[
          "What did the chef control directly?",
          "Why are servings an effect in this situation?"
        ],
        quiz:[
          {id:"q1",prompt:"Which variable does the chef control?",choices:["Smoothie servings","Fruit puree cups","Student appetite","Music volume"],answer:1,explain:"The chef decides how many cups of puree to use."},
          {id:"q2",prompt:"Why are servings dependent?",choices:["They are the cause","They change after the cups change","They never change","They label the graph only"],answer:1,explain:"Servings respond to the amount of puree used."}
        ]
      },
      {
        id:"rain-lab",
        district:"Cloud Arcade",
        title:"Rain Tank Rescue",
        description:"Control rainfall minutes and monitor the tank level rising through the storm grid.",
        independentLabel:"Minutes of rainfall",
        dependentLabel:"Tank water level",
        unitIndependent:"min",
        unitDependent:"L",
        min:2, max:12, step:2, base:5, factor:4,
        heroMetric:"liters stored",
        sceneMode:"storm",
        narrative:"Cloud Arcade's emergency tank must pass one final systems test before tomorrow's citywide storm drill.",
        prompts:[
          "What was the cause in this experiment?",
          "How can you tell the tank level is the dependent variable?"
        ],
        quiz:[
          {id:"q1",prompt:"Which variable depends on rainfall time?",choices:["Tank water level","Rainfall minutes","The city zip code","The weather badge"],answer:0,explain:"The water level changes because the rainfall time changes."},
          {id:"q2",prompt:"Best clue for spotting an independent variable?",choices:["It is what gets changed on purpose","It is always the result","It must be the biggest number","It always uses liters"],answer:0,explain:"The independent variable is the one the experimenter controls."}
        ]
      }
    ];

    const FUTURE_NODES = [
      "Store long-term mastery and unlock cinematic endings",
      "Add teacher dashboard export and standards analytics",
      "Swap in new districts for proportional or linear relationships",
      "Support voice lines, badges, and deeper mission trees",
      "Package as a wrapped mobile app with haptics and audio"
    ];

    const state = {
      selectedMissionId: MISSIONS[0].id,
      sliderValue: MISSIONS[0].min,
      answers: {},
      stars: 0,
      mastery: 0,
      completed: {},
      totalCorrect: 0,
      discussionDone: {},
      message: "Choose a district, run the experiment, and track how the output responds.",
      messageTone: "",
      cameraBoost: 0,
      level: 1
    };

    const $ = (s, root=document) => root.querySelector(s);
    const $$ = (s, root=document) => Array.from(root.querySelectorAll(s));

    function announce(text){
      const node = $("#liveRegion");
      node.textContent = "";
      requestAnimationFrame(() => node.textContent = text);
    }

    function loadState(){
      try{
        const raw = localStorage.getItem(STORAGE_KEY);
        if(raw) Object.assign(state, JSON.parse(raw));
      }catch(err){
        console.warn("Load skipped", err);
      }
    }

    function saveState(){
      try{
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      }catch(err){
        console.warn("Save skipped", err);
      }
    }

    function getMission(id){
      return MISSIONS.find(m => m.id === id) || MISSIONS[0];
    }

    function currentMission(){
      return getMission(state.selectedMissionId);
    }

    function computeDependent(mission, independent){
      return Number((mission.base + independent * mission.factor).toFixed(1));
    }

    function missionUnlocked(index){
      return index === 0 || Object.keys(state.completed).length >= index;
    }

    function missionProgress(){
      return Math.round((Object.keys(state.completed).length / MISSIONS.length) * 100);
    }

    function nextMission(){
      const i = MISSIONS.findIndex(m => m.id === state.selectedMissionId);
      return MISSIONS[i + 1] || null;
    }

    function currentOutputs(){
      const mission = currentMission();
      const independent = Number(state.sliderValue);
      const dependent = computeDependent(mission, independent);
      const rangePct = ((independent - mission.min) / Math.max(mission.max - mission.min, 1)) * 100;
      const efficiency = Number((dependent / Math.max(independent, 1)).toFixed(1));
      const energy = Math.round(18 + rangePct * .82);
      return { mission, independent, dependent, rangePct, efficiency, energy };
    }

    function updateLevel(){
      state.level = Math.max(1, Math.floor(state.stars / 60) + 1);
    }

    function selectMission(id){
      state.selectedMissionId = id;
      state.sliderValue = currentMission().min;
      state.message = currentMission().narrative;
      state.messageTone = "";
      state.cameraBoost = 18;
      saveState();
      render();
      announce(currentMission().title + " loaded");
      setTimeout(() => {
        state.cameraBoost = 0;
        applyCameraBoost();
      }, 280);
    }

    function updateSlider(value){
      state.sliderValue = Number(value);
      const { mission, independent, dependent } = currentOutputs();
      state.message = `${mission.independentLabel} is set to ${independent} ${mission.unitIndependent}. ${mission.dependentLabel} responds at ${dependent} ${mission.unitDependent}.`;
      state.messageTone = "";
      saveState();
      render();
    }

    function answerQuestion(questionIndex, answerIndex){
      const mission = currentMission();
      const q = mission.quiz[questionIndex];
      const key = mission.id + ":" + q.id;
      if(state.answers[key] != null) return;

      state.answers[key] = answerIndex;
      if(answerIndex === q.answer){
        state.totalCorrect += 1;
        state.stars += 18;
        state.mastery = Math.min(100, state.mastery + 12);
        state.message = "Correct. " + q.explain;
        state.messageTone = "good";
      }else{
        state.mastery = Math.max(0, state.mastery - 4);
        state.message = "Not quite. " + q.explain;
        state.messageTone = "bad";
      }

      const allAnswered = mission.quiz.every(item => state.answers[mission.id + ":" + item.id] != null);
      const allCorrect = mission.quiz.every(item => state.answers[mission.id + ":" + item.id] === item.answer);

      if(allAnswered && allCorrect && !state.completed[mission.id]){
        state.completed[mission.id] = true;
        state.stars += 40;
        state.mastery = Math.min(100, state.mastery + 16);
        state.message = `${mission.title} complete. ${mission.district} is stabilized and the next district is now online.`;
        state.messageTone = "good";
      }

      updateLevel();
      saveState();
      render();
    }

    function markDiscussionDone(){
      const mission = currentMission();
      state.discussionDone[mission.id] = true;
      state.stars += 8;
      state.mastery = Math.min(100, state.mastery + 4);
      state.message = "Debrief locked in. You discussed the relationship and earned reflection points.";
      state.messageTone = "good";
      updateLevel();
      saveState();
      render();
    }

    function resetProgress(){
      state.selectedMissionId = MISSIONS[0].id;
      state.sliderValue = MISSIONS[0].min;
      state.answers = {};
      state.stars = 0;
      state.mastery = 0;
      state.completed = {};
      state.totalCorrect = 0;
      state.discussionDone = {};
      state.level = 1;
      state.message = "Progress reset. Re-enter Variable City XR from the first district.";
      state.messageTone = "";
      state.cameraBoost = 0;
      saveState();
      render();
    }

    function graphData(mission){
      const xs = [];
      for(let x = mission.min; x <= mission.max; x += mission.step) xs.push(x);
      const ys = xs.map(x => computeDependent(mission, x));
      const minY = Math.min(...ys);
      const maxY = Math.max(...ys);
      const width = 420;
      const height = 280;
      const left = 44;
      const bottom = 234;
      const usableW = 334;
      const usableH = 170;

      const points = xs.map((x, index) => {
        const y = ys[index];
        const px = left + (index / Math.max(xs.length - 1, 1)) * usableW;
        const py = bottom - ((y - minY) / Math.max(maxY - minY, 1)) * usableH;
        return { x, y, px, py };
      });

      return {
        xs, ys, minY, maxY, width, height, left, bottom, usableW, usableH, points,
        path: points.map((p, i) => (i ? "L" : "M") + p.px.toFixed(1) + " " + p.py.toFixed(1)).join(" ")
      };
    }

    function currentGraphDot(mission){
      const data = graphData(mission);
      return data.points.find(p => p.x === Number(state.sliderValue)) || data.points[0];
    }

    function confettiMarkup(){
      const colors = ["#44c2ff","#5ef2c3","#ffd56b","#ff8ca3"];
      return Array.from({length:20}, (_, i) => {
        const left = 4 + i * 4.6;
        const color = colors[i % colors.length];
        const delay = (i * .16).toFixed(2);
        const duration = (3.1 + (i % 4) * .42).toFixed(2);
        return `<span style="left:${left}%;background:${color};animation-delay:${delay}s;animation-duration:${duration}s"></span>`;
      }).join("");
    }

    function answeredAllCorrect(mission){
      return mission.quiz.every(item => state.answers[mission.id + ":" + item.id] === item.answer);
    }

    function discussionUnlocked(mission){
      return answeredAllCorrect(mission);
    }

    function sceneVisuals(mission, rangePct, dependent){
      const pct = Math.max(0, Math.min(100, rangePct));
      const sunX = 70 - pct * .22;
      const sunY = 18 + (100 - pct) * .08;
      const billboardGlow = 18 + pct * .36;
      const trafficSpeed = Math.max(3.4, 9 - pct * .035);
      const weatherOpacity = mission.sceneMode === "storm" ? .3 + pct * .005 : .06;
      return { sunX, sunY, billboardGlow, trafficSpeed, weatherOpacity, dependent };
    }

    function renderSceneTowers(mission, independent, dependent){
      const baseHeights = [
        100 + independent * 3,
        116 + dependent * 1.8,
        86 + independent * 2.4,
        132 + dependent * 1.25,
        78 + independent * 1.8,
        108 + dependent * 1.55
      ];

      const bg = baseHeights.map((h, i) => `<div class="tower" style="height:${Math.max(70, h * .66 + i * 4)}px"></div>`).join("");
      const mid = baseHeights.map((h, i) => `<div class="tower" style="height:${Math.max(88, h * .86 + (i % 2 ? 8 : 0))}px"></div>`).join("");
      const front = baseHeights.map((h, i) => `<div class="tower" style="height:${Math.max(110, h + (i % 3 ? 10 : 0))}px"></div>`).join("");
      return { bg, mid, front };
    }

    function billboardMarkup(mission, dependent){
      const labels = [
        `${mission.independentLabel.split(" ")[0]} ↑`,
        `${mission.dependentLabel.split(" ")[0]} ${dependent}`,
        mission.heroMetric
      ];
      return labels.map((label, i) => {
        const left = [17, 48, 74][i];
        const top = [46, 37, 50][i];
        return `<div class="billboard" data-label="${label}" style="left:${left}%;top:${top}%;"></div>`;
      }).join("");
    }

    function laneLightsMarkup(speed){
      return Array.from({length:5}, (_, i) => {
        const left = -20 + i * 18;
        const duration = (speed + i * .45).toFixed(2);
        const delay = (-i * 1.2).toFixed(2);
        return `<div class="lane-light" style="left:${left}%;animation-duration:${duration}s;animation-delay:${delay}s"></div>`;
      }).join("");
    }

    function skyShipsMarkup(){
      return Array.from({length:3}, (_, i) => {
        const top = [16, 24, 32][i];
        const duration = (12 + i * 5).toFixed(2);
        const delay = (-i * 4.5).toFixed(2);
        const width = 110 + i * 28;
        return `<div class="sky-ship" style="top:${top}%;left:-220px;width:${width}px;animation-duration:${duration}s;animation-delay:${delay}s"></div>`;
      }).join("");
    }

    function particlesMarkup(){
      const coords = [
        [22,28],[34,18],[42,34],[57,22],[68,31],[76,19],[61,13],[28,40]
      ];
      return coords.map((c, i) =>
        `<span class="particle" style="left:${c[0]}%;top:${c[1]}%;animation-delay:${(i*.34).toFixed(2)}s"></span>`
      ).join("");
    }

    function renderStars(){
      const root = $("#stars");
      if(!root || root.children.length) return;
      const bits = Array.from({length:66}, (_, i) => {
        const left = Math.random() * 100;
        const top = Math.random() * 100;
        const duration = 2 + Math.random() * 5;
        const delay = Math.random() * 4;
        const size = Math.random() < .12 ? 3 : 2;
        return `<span style="left:${left}%;top:${top}%;width:${size}px;height:${size}px;animation-duration:${duration}s;animation-delay:${delay}s"></span>`;
      }).join("");
      root.innerHTML = bits;
    }

    function render(){
      const root = $("#app");
      const mission = currentMission();
      const { independent, dependent, rangePct, efficiency, energy } = currentOutputs();
      const progress = missionProgress();
      const dot = currentGraphDot(mission);
      const graph = graphData(mission);
      const missionCleared = !!state.completed[mission.id];
      const upcomingMission = nextMission();
      const visuals = sceneVisuals(mission, rangePct, dependent);
      const towers = renderSceneTowers(mission, independent, dependent);
      const debriefReady = discussionUnlocked(mission);
      const debriefDone = !!state.discussionDone[mission.id];

      root.innerHTML = `
        <section class="hero">
          <div class="hero-grid">
            <div>
              <div class="eyebrow">XR learning world • premium HTML build</div>
              <h1>Variable City XR</h1>
              <p class="hero-copy">A deeper, more cinematic build: layered 3D skyline, reactive traffic lanes, holographic data boards, mission unlocks, graph intelligence, and post-mission discussion prompts that make the math feel like a real system instead of a flat demo.</p>
              <div class="hero-actions">
                <button class="primary" id="enterMissionBtn">Launch ${mission.district}</button>
                <button class="ghost" id="focusGraphBtn">Focus Graph</button>
                <button class="danger" id="resetBtn">Reset Progress</button>
              </div>
            </div>

            <div class="hero-stats">
              <div class="stat">
                <div class="stat-label">Mastery</div>
                <span class="stat-value">${state.mastery}%</span>
              </div>
              <div class="stat">
                <div class="stat-label">Stars</div>
                <span class="stat-value">${state.stars}</span>
              </div>
              <div class="stat">
                <div class="stat-label">Pilot level</div>
                <span class="stat-value">${state.level}</span>
              </div>
              <div style="flex-basis:100%">
                <div class="progress-shell"><div class="progress-fill" style="width:${progress}%"></div></div>
                <div class="small" style="margin-top:8px">District campaign completion ${progress}%</div>
              </div>
            </div>
          </div>

          <div class="system-bar">
            <div class="system-card">
              <strong>1. Enter a district</strong>
              Choose a mission and identify the input the player controls.
            </div>
            <div class="system-card">
              <strong>2. Drive the simulation</strong>
              Move the control, tilt the scene, and watch the city and graph react together.
            </div>
            <div class="system-card">
              <strong>3. Secure the concept</strong>
              Clear both checks, then complete the discussion debrief to lock in vocabulary.
            </div>
          </div>
        </section>

        <section class="main-grid">
          <aside class="sidebar">
            <section class="panel">
              <div class="panel-inner">
                <h3>Mission Select</h3>
                <div class="small">Districts unlock in order. A district is fully mastered when both checks are correct and the debrief is complete.</div>
                <div class="mission-list">
                  ${MISSIONS.map((item, index) => `
                    <article class="mission ${item.id === mission.id ? "active" : ""} ${missionUnlocked(index) ? "" : "locked"}" data-mission="${item.id}">
                      <div class="mission-title">
                        <span>${item.title}</span>
                        <span>${state.completed[item.id] ? (state.discussionDone[item.id] ? "Mastered" : "Cleared") : missionUnlocked(index) ? "Ready" : "Locked"}</span>
                      </div>
                      <div class="small">${item.description}</div>
                    </article>
                  `).join("")}
                </div>
              </div>
            </section>

            <section class="panel">
              <div class="panel-inner">
                <h3>Memory Lock</h3>
                <div class="mini-list">
                  <div class="mini-item"><strong>Independent variable</strong>You control it. It is the cause, input, or setup variable.</div>
                  <div class="mini-item"><strong>Dependent variable</strong>It responds. It is the effect, output, or result variable.</div>
                  <div class="mini-item"><strong>Graph clue</strong>The x-axis usually shows the independent variable. The y-axis usually shows the dependent variable.</div>
                </div>
              </div>
            </section>

            <section class="panel">
              <div class="panel-inner">
                <h3>System Status</h3>
                <div class="status-row">
                  <div class="status-pill">Districts ${Object.keys(state.completed).length}/${MISSIONS.length}</div>
                  <div class="status-pill">Correct ${state.totalCorrect}</div>
                  <div class="status-pill">Debriefs ${Object.keys(state.discussionDone).length}</div>
                </div>
                <div class="meter">
                  <div>
                    <div class="small">Energy grid</div>
                    <div class="meter-line"><span style="width:${energy}%"></span></div>
                  </div>
                  <div>
                    <div class="small">Concept stability</div>
                    <div class="meter-line"><span style="width:${Math.max(10,state.mastery)}%"></span></div>
                  </div>
                </div>
              </div>
            </section>
          </aside>

          <section class="screen-stack">
            <section class="overview-grid">
              <section class="panel">
                <div class="panel-inner">
                  <h2>${mission.title}</h2>
                  <div class="small">${mission.narrative}</div>

                  ${missionCleared ? `
                    <div class="mission-complete" style="margin-top:16px">
                      <div class="confetti">${confettiMarkup()}</div>
                      <h3>District Cleared</h3>
                      <div class="small">
                        ${mission.district} is stable. ${debriefDone ? "Reflection complete and knowledge locked." : "Finish the discussion debrief to convert this clear into full mastery."}
                        ${upcomingMission ? " Next stop: " + upcomingMission.district + "." : " Final campaign district complete."}
                      </div>
                      <div class="system-tags" style="margin-top:12px">
                        <span class="tag">+40 stars awarded</span>
                        <span class="tag">Mastery boosted</span>
                        <span class="tag">${upcomingMission ? "Next district unlocked" : "Campaign complete"}</span>
                      </div>
                    </div>
                  ` : ""}

                  <div class="city-stage" style="margin-top:16px">
                    <div class="scene-wrap">
                      <div class="scene" id="sceneRoot" data-mode="${mission.sceneMode}">
                        <div class="scene-world" style="--sun-x:${visuals.sunX}%;--sun-y:${visuals.sunY}%;">
                          <div class="sky-glow"></div>
                          <div class="aurora"></div>

                          <div class="cloud-layer">
                            <div class="cloud c1"></div>
                            <div class="cloud c2"></div>
                            <div class="cloud c3"></div>
                          </div>

                          <div class="rings-layer">
                            <div class="ring r1"></div>
                            <div class="ring r2"></div>
                            <div class="ring r3"></div>
                          </div>

                          <div class="particles">${particlesMarkup()}</div>

                          <div class="city-bg">
                            <div class="skyline">${towers.bg}</div>
                          </div>
                          <div class="city-mid">
                            <div class="skyline">${towers.mid}</div>
                          </div>
                          <div class="billboard-layer">${billboardMarkup(mission, dependent)}</div>
                          <div class="city-front">
                            <div class="skyline">${towers.front}</div>
                          </div>

                          <div class="lane-layer">
                            <div class="road-grid"></div>
                            <div class="road"></div>
                            ${laneLightsMarkup(visuals.trafficSpeed)}
                          </div>

                          <div class="sky-traffic">${skyShipsMarkup()}</div>

                          <div class="drone-layer">
                            <div class="drone" style="right:${12 + rangePct * .08}%;top:${18 + (100 - rangePct) * .06}%"></div>
                          </div>

                          <div class="avatar-shadow"></div>
                          <div class="avatar-layer">
                            <div class="avatar">
                              <div class="head"></div>
                              <div class="visor"></div>
                              <div class="body"></div>
                              <div class="arm left"></div>
                              <div class="arm right"></div>
                              <div class="leg left"></div>
                              <div class="leg right"></div>
                            </div>
                          </div>

                          <div class="hud-layer">
                            <div class="scene-label">${mission.district}</div>

                            <div class="holo-card">
                              <div class="small" style="margin-bottom:6px">Active input</div>
                              <strong>${mission.independentLabel}</strong>
                              <div style="margin-top:8px;font-size:28px;font-weight:900">${independent} ${mission.unitIndependent}</div>
                            </div>

                            <div class="scene-kpis">
                              <span class="tag">Input ${independent} ${mission.unitIndependent}</span>
                              <span class="tag">Output ${dependent} ${mission.unitDependent}</span>
                              <span class="tag">Energy ${energy}%</span>
                            </div>
                          </div>
                        </div>
                      </div>

                      <div class="scene-bottom">
                        <div class="mini-panel">
                          <div class="small">Cause</div>
                          <strong>${mission.independentLabel}</strong>
                        </div>
                        <div class="mini-panel">
                          <div class="small">Effect</div>
                          <strong>${mission.dependentLabel}</strong>
                        </div>
                        <div class="mini-panel">
                          <div class="small">Response ratio</div>
                          <strong>${efficiency}</strong>
                        </div>
                      </div>
                    </div>

                    <div class="control-card">
                      <h3>Experiment Control</h3>
                      <div class="small">Shift the independent variable. The world camera, towers, billboards, traffic, and graph respond together.</div>

                      <div style="margin-top:16px">
                        <div class="slider-row">
                          <div>
                            <div class="tag">${mission.independentLabel}</div>
                            <strong style="font-size:30px">${independent} ${mission.unitIndependent}</strong>
                          </div>
                          <div style="text-align:right">
                            <div class="tag">${mission.dependentLabel}</div>
                            <strong style="font-size:30px">${dependent} ${mission.unitDependent}</strong>
                          </div>
                        </div>

                        <input id="variableSlider" type="range" min="${mission.min}" max="${mission.max}" step="${mission.step}" value="${independent}" />
                        <div class="axis">
                          <span>${mission.min} ${mission.unitIndependent}</span>
                          <span>${mission.max} ${mission.unitIndependent}</span>
                        </div>
                      </div>

                      <div class="output-grid">
                        <div class="output">
                          <span>Input type</span>
                          <strong>Independent</strong>
                        </div>
                        <div class="output">
                          <span>Output type</span>
                          <strong>Dependent</strong>
                        </div>
                        <div class="output">
                          <span>Scene charge</span>
                          <strong>${energy}%</strong>
                        </div>
                      </div>

                      <div class="coach-grid">
                        <div class="coach">
                          <b>Notice</b>
                          What changed because you moved the slider?
                        </div>
                        <div class="coach">
                          <b>Name it</b>
                          Say which variable was the cause.
                        </div>
                        <div class="coach">
                          <b>Prove it</b>
                          Use the graph or scene as evidence.
                        </div>
                      </div>

                      <div class="feedback ${state.messageTone}">${state.message}</div>
                    </div>
                  </div>
                </div>
              </section>

              <section class="panel" id="graphPanel">
                <div class="panel-inner">
                  <h3>Reaction Graph</h3>
                  <div class="small">The line tracks how the output changes when the input changes. The highlighted point shows the current experiment setting.</div>

                  <div class="graph">
                    <svg viewBox="0 0 420 280" role="img" aria-label="Mission graph">
                      <defs>
                        <linearGradient id="lineGlow" x1="0%" y1="0%" x2="100%" y2="0%">
                          <stop offset="0%" stop-color="#5ef2c3"></stop>
                          <stop offset="52%" stop-color="#44c2ff"></stop>
                          <stop offset="100%" stop-color="#ffd56b"></stop>
                        </linearGradient>
                        <filter id="softGlow">
                          <feGaussianBlur stdDeviation="4" result="blur"></feGaussianBlur>
                          <feMerge>
                            <feMergeNode in="blur"></feMergeNode>
                            <feMergeNode in="SourceGraphic"></feMergeNode>
                          </feMerge>
                        </filter>
                      </defs>

                      <line x1="${graph.left}" y1="${graph.bottom}" x2="${graph.left + graph.usableW}" y2="${graph.bottom}" stroke="rgba(255,255,255,.45)" stroke-width="2"></line>
                      <line x1="${graph.left}" y1="36" x2="${graph.left}" y2="${graph.bottom}" stroke="rgba(255,255,255,.45)" stroke-width="2"></line>

                      ${graph.points.map((p, i) => `
                        <line x1="${p.px}" y1="${graph.bottom}" x2="${p.px}" y2="${graph.bottom + 8}" stroke="rgba(255,255,255,.28)" stroke-width="1.5"></line>
                        <text x="${p.px}" y="${graph.bottom + 24}" fill="#a8bfd1" font-size="12" text-anchor="middle">${p.x}</text>
                      `).join("")}

                      ${Array.from({length:5}, (_, i) => {
                        const val = graph.minY + ((graph.maxY - graph.minY) / 4) * i;
                        const y = graph.bottom - ((val - graph.minY) / Math.max(graph.maxY - graph.minY, 1)) * graph.usableH;
                        return `
                          <line x1="${graph.left - 6}" y1="${y}" x2="${graph.left + graph.usableW}" y2="${y}" stroke="rgba(255,255,255,.08)" stroke-width="1"></line>
                          <text x="${graph.left - 10}" y="${y + 4}" fill="#a8bfd1" font-size="12" text-anchor="end">${Number(val.toFixed(1))}</text>
                        `;
                      }).join("")}

                      <path d="${graph.path}" fill="none" stroke="url(#lineGlow)" stroke-width="5" stroke-linecap="round" filter="url(#softGlow)"></path>

                      ${graph.points.map(p => `
                        <circle cx="${p.px}" cy="${p.py}" r="5.2" fill="#dff8ff" opacity=".88"></circle>
                      `).join("")}

                      <line x1="${dot.px}" y1="${dot.py}" x2="${dot.px}" y2="${graph.bottom}" stroke="rgba(255,213,107,.28)" stroke-width="2" stroke-dasharray="5 5"></line>
                      <line x1="${graph.left}" y1="${dot.py}" x2="${dot.px}" y2="${dot.py}" stroke="rgba(94,242,195,.24)" stroke-width="2" stroke-dasharray="5 5"></line>
                      <circle cx="${dot.px}" cy="${dot.py}" r="11" fill="rgba(255,213,107,.14)"></circle>
                      <circle cx="${dot.px}" cy="${dot.py}" r="7.2" fill="#ffd56b" stroke="#fff2bc" stroke-width="2"></circle>

                      <rect x="${Math.min(dot.px + 12, 260)}" y="${Math.max(dot.py - 40, 28)}" rx="12" ry="12" width="126" height="42" fill="rgba(8,26,41,.88)" stroke="rgba(255,255,255,.08)"></rect>
                      <text x="${Math.min(dot.px + 24, 272)}" y="${Math.max(dot.py - 22, 46)}" fill="#dff8ff" font-size="12">${mission.independentLabel}: ${dot.x}</text>
                      <text x="${Math.min(dot.px + 24, 272)}" y="${Math.max(dot.py - 8, 60)}" fill="#dff8ff" font-size="12">${mission.dependentLabel}: ${dot.y}</text>

                      <text x="${graph.left + graph.usableW / 2}" y="270" fill="#a8bfd1" font-size="13" text-anchor="middle">${mission.independentLabel}</text>
                      <text x="-145" y="20" fill="#a8bfd1" font-size="13" text-anchor="middle" transform="rotate(-90)">${mission.dependentLabel}</text>
                    </svg>
                  </div>

                  <div class="graph-legend">
                    <span>Current point: <b style="color:#ffd56b">${dot.x}, ${dot.y}</b></span>
                    <span>X-axis = independent variable</span>
                    <span>Y-axis = dependent variable</span>
                  </div>

                  <div class="quiz-card" style="margin-top:18px">
                    <h3>Concept Check</h3>
                    ${mission.quiz.map((question, questionIndex) => {
                      const key = mission.id + ":" + question.id;
                      const answered = state.answers[key];
                      const correct = answered === question.answer;
                      return `
                        <div style="margin-top:${questionIndex ? 18 : 0}px">
                          <h4>${questionIndex + 1}. ${question.prompt}</h4>
                          <div class="choice-grid">
                            ${question.choices.map((choice, answerIndex) => {
                              const cls = answered == null ? "choice" : answerIndex === question.answer ? "choice correct" : answered === answerIndex ? "choice wrong" : "choice";
                              return `<button class="${cls}" data-question="${questionIndex}" data-answer="${answerIndex}" ${answered != null ? "disabled" : ""}>${choice}</button>`;
                            }).join("")}
                          </div>
                          <div class="small" style="margin-top:8px">
                            ${answered == null ? "Pick the best answer." : correct ? "Answered correctly." : "Answered. Review the feedback panel and the graph."}
                          </div>
                        </div>
                      `;
                    }).join("")}
                  </div>

                  <div class="debrief-card" style="margin-top:18px">
                    <h3>Discussion Debrief</h3>
                    <div class="small">After the concept check, discuss the mission with a partner or explain it aloud to lock in the relationship.</div>
                    <div class="debrief-grid">
                      <div class="mini-item"><strong>Talk prompt 1</strong>${mission.prompts[0]}</div>
                      <div class="mini-item"><strong>Talk prompt 2</strong>${mission.prompts[1]}</div>
                    </div>
                    <div style="margin-top:14px;display:flex;gap:12px;align-items:center;flex-wrap:wrap">
                      <button id="discussionBtn" class="primary" ${debriefReady && !debriefDone ? "" : "disabled"}>${debriefDone ? "Debrief Complete" : "Mark Discussion Complete"}</button>
                      <div class="small">${debriefReady ? (debriefDone ? "Reflection points already awarded." : "Unlocks after both concept checks are correct.") : "Get both concept checks correct to unlock the debrief reward."}</div>
                    </div>
                  </div>
                </div>
              </section>
            </section>

            <section class="footer-grid">
              <section class="panel">
                <div class="panel-inner">
                  <h3>Mission Insight</h3>
                  <div class="insight-card">
                    <div class="footer-tags">
                      <span class="tag">Independent = input</span>
                      <span class="tag">Dependent = output</span>
                      <span class="tag">Evidence = graph + scene</span>
                    </div>
                    <div class="mini-list">
                      <div class="mini-item"><strong>What you controlled</strong>${mission.independentLabel} was changed on purpose during the experiment.</div>
                      <div class="mini-item"><strong>What reacted</strong>${mission.dependentLabel} changed because the independent variable changed.</div>
                      <div class="mini-item"><strong>How to explain it</strong>Say: “When the input changed, the output responded.” Then name both variables.</div>
                    </div>
                  </div>
                </div>
              </section>

              <section class="panel">
                <div class="panel-inner">
                  <h3>Product-Ready Expansion Path</h3>
                  <div class="future-card">
                    <div class="small">This version is built like a premium interactive product foundation: layered scene engine, mission schema, progression, discussion loop, and graph renderer all ready for packaging into a stronger release.</div>
                    <div class="system-tags" style="margin-top:12px">
                      <span class="tag">Modular mission engine</span>
                      <span class="tag">Touch + mouse ready</span>
                      <span class="tag">Teacher analytics path</span>
                    </div>
                    <div class="mini-list">
                      ${FUTURE_NODES.map(item => `<div class="mini-item"><strong>Roadmap node</strong>${item}</div>`).join("")}
                    </div>
                  </div>
                </div>
              </section>
            </section>
          </section>
        </section>
      `;

      bindEvents();
      applyCameraBoost();
      renderStars();
      saveState();
    }

    function applyCameraBoost(){
      const scene = $("#sceneRoot");
      if(!scene) return;
      if(state.cameraBoost){
        scene.style.setProperty("--cam-y", `${-state.cameraBoost / 2}px`);
      }else{
        scene.style.setProperty("--cam-y", "0px");
      }
    }

    function bindEvents(){
      const slider = $("#variableSlider");
      if(slider) slider.addEventListener("input", e => updateSlider(e.target.value));

      const reset = $("#resetBtn");
      if(reset) reset.addEventListener("click", resetProgress);

      const enter = $("#enterMissionBtn");
      if(enter) enter.addEventListener("click", () => {
        const scene = $("#sceneRoot");
        if(scene) scene.scrollIntoView({behavior:"smooth", block:"center"});
      });

      const focusGraphBtn = $("#focusGraphBtn");
      if(focusGraphBtn) focusGraphBtn.addEventListener("click", () => {
        const panel = $("#graphPanel");
        if(panel) panel.scrollIntoView({behavior:"smooth", block:"center"});
      });

      const discussionBtn = $("#discussionBtn");
      if(discussionBtn) discussionBtn.addEventListener("click", markDiscussionDone);

      $$(".mission").forEach((node, index) => {
        node.addEventListener("click", () => {
          if(!missionUnlocked(index)) return;
          selectMission(node.dataset.mission);
        });
      });

      $$("[data-question]").forEach(node => {
        node.addEventListener("click", () => {
          answerQuestion(Number(node.dataset.question), Number(node.dataset.answer));
        });
      });

      setupSceneParallax();
    }

    let parallaxBound = false;
    function setupSceneParallax(){
      const scene = $("#sceneRoot");
      if(!scene) return;

      if(parallaxBound) return;
      parallaxBound = true;

      const move = (clientX, clientY) => {
        const rect = scene.getBoundingClientRect();
        const x = ((clientX - rect.left) / rect.width) * 2 - 1;
        const y = ((clientY - rect.top) / rect.height) * 2 - 1;
        const tiltY = (-x * 11).toFixed(2);
        const tiltX = (8 + y * 6).toFixed(2);
        scene.style.setProperty("--scene-tilt-y", `${tiltY}deg`);
        scene.style.setProperty("--scene-tilt-x", `${tiltX}deg`);
        scene.style.setProperty("--cam-x", `${(x * 12).toFixed(1)}px`);
        scene.style.setProperty("--cam-y", `${(y * 8 - state.cameraBoost / 2).toFixed(1)}px`);
      };

      document.addEventListener("mousemove", (e) => {
        const current = $("#sceneRoot");
        if(!current) return;
        move(e.clientX, e.clientY);
      }, {passive:true});

      document.addEventListener("touchmove", (e) => {
        const current = $("#sceneRoot");
        if(!current || !e.touches[0]) return;
        move(e.touches[0].clientX, e.touches[0].clientY);
      }, {passive:true});
    }

    loadState();
    updateLevel();
    render();
  </script>
</body>
</html>
