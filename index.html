<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Variable City — a polished interactive game for learning independent and dependent variables." />
  <title>Variable City — Input to Output</title>
  <style>
    :root{
      --bg:#f4fbff;
      --bg-2:#e7f5ff;
      --panel:#ffffff;
      --panel-2:#f4faff;
      --line:rgba(61,124,182,.14);
      --text:#16324c;
      --muted:#67819b;
      --accent:#2eb2ff;
      --accent-2:#67e2bf;
      --accent-3:#ffd66f;
      --ok:#49cfa5;
      --bad:#ff7c97;
      --shadow:0 22px 52px rgba(71,123,176,.14);
      --radius-xl:28px;
      --radius-lg:22px;
      --radius-md:16px;
      --font-ui:Inter,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
      --font-display:Inter,system-ui,-apple-system,"Segoe UI",sans-serif;
    }

    *{box-sizing:border-box}
    html,body{height:100%;margin:0}
    body{
      font-family:var(--font-ui);
      color:var(--text);
      background:
        radial-gradient(circle at 14% 10%, rgba(46,178,255,.16), transparent 18%),
        radial-gradient(circle at 86% 10%, rgba(103,226,191,.16), transparent 16%),
        linear-gradient(180deg,#fbfeff 0%, var(--bg) 50%, var(--bg-2) 100%);
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background:
        linear-gradient(rgba(22,50,76,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(22,50,76,.03) 1px, transparent 1px);
      background-size:36px 36px;
      mask-image:linear-gradient(180deg, transparent, #000 10%, #000 90%, transparent);
      opacity:.45;
    }

    .app{
      position:relative;
      width:min(1360px, calc(100% - 28px));
      margin:0 auto;
      padding:22px 0 34px;
    }

    .hero{
      position:relative;
      overflow:hidden;
      border-radius:var(--radius-xl);
      border:1px solid var(--line);
      background:linear-gradient(180deg, rgba(255,255,255,.96), rgba(242,249,255,.96));
      box-shadow:var(--shadow);
      padding:24px;
    }

    .hero::after{
      content:"";
      position:absolute;
      right:-60px;
      top:-40px;
      width:260px;
      height:260px;
      border-radius:32px;
      background:
        linear-gradient(145deg, rgba(46,178,255,.14), rgba(103,226,191,.12)),
        radial-gradient(circle at 30% 24%, rgba(255,255,255,.72), transparent 36%);
      transform:perspective(1000px) rotateY(-22deg) rotateX(10deg);
      border:1px solid rgba(255,255,255,.5);
      box-shadow:0 24px 54px rgba(71,123,176,.12);
      animation:floatCard 7s ease-in-out infinite;
    }

    .hero-grid{
      position:relative;
      z-index:1;
      display:grid;
      grid-template-columns:1.1fr .9fr;
      gap:20px;
      align-items:center;
    }

    .eyebrow{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 12px;
      border-radius:999px;
      background:rgba(103,226,191,.18);
      border:1px solid rgba(103,226,191,.32);
      color:#177760;
      font-size:12px;
      font-weight:800;
      text-transform:uppercase;
      letter-spacing:.12em;
    }

    h1{
      margin:14px 0 8px;
      font-family:var(--font-display);
      font-size:clamp(42px, 6vw, 76px);
      line-height:.94;
      letter-spacing:-.06em;
      max-width:9ch;
    }

    .hero-copy{
      margin:0;
      max-width:60ch;
      color:var(--muted);
      font-size:15px;
      line-height:1.6;
    }

    .hero-actions,.hero-stats,.status-row,.footer-tags,.choice-grid,.coach-grid{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
    }

    .hero-actions{margin-top:18px}

    .stat,.tag,.status-pill{
      border-radius:18px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.76);
      backdrop-filter:blur(10px);
    }

    .stat{
      padding:14px;
      min-width:124px;
      flex:1;
      background:linear-gradient(180deg, rgba(255,255,255,.88), rgba(244,250,255,.92));
    }

    .stat-label{
      font-size:11px;
      text-transform:uppercase;
      letter-spacing:.14em;
      color:var(--muted);
    }

    .stat-value{
      display:block;
      margin-top:6px;
      font-size:28px;
      font-weight:900;
    }

    .system-bar{
      margin-top:18px;
      display:grid;
      grid-template-columns:repeat(3, minmax(0, 1fr));
      gap:12px;
    }

    .system-card{
      padding:14px 15px;
      border-radius:20px;
      border:1px solid var(--line);
      background:linear-gradient(180deg, rgba(255,255,255,.82), rgba(246,251,255,.88));
      box-shadow:0 8px 18px rgba(71,123,176,.08);
    }

    .system-card strong{
      display:block;
      margin-bottom:5px;
      font-size:15px;
    }

    .main-grid{
      display:grid;
      grid-template-columns:320px 1fr;
      gap:20px;
      margin-top:20px;
      align-items:start;
    }

    .sidebar{
      display:grid;
      gap:20px;
      position:sticky;
      top:14px;
    }

    .panel{
      position:relative;
      overflow:hidden;
      border-radius:var(--radius-lg);
      border:1px solid var(--line);
      background:linear-gradient(180deg, rgba(255,255,255,.94), rgba(244,250,255,.96));
      box-shadow:var(--shadow);
    }

    .panel-inner{padding:18px}
    .panel h2,.panel h3,.panel h4{
      margin:0 0 12px;
      letter-spacing:-.02em;
    }

    .small{
      color:var(--muted);
      font-size:13px;
      line-height:1.55;
    }

    .progress-shell{
      margin-top:10px;
      height:12px;
      border-radius:999px;
      background:rgba(46,178,255,.08);
      overflow:hidden;
      border:1px solid rgba(46,178,255,.06);
    }

    .progress-fill{
      height:100%;
      background:linear-gradient(90deg, var(--accent-2), var(--accent), var(--accent-3));
      transition:width .35s ease;
      box-shadow:0 0 16px rgba(46,178,255,.18);
    }

    .mission-list{
      display:grid;
      gap:12px;
      margin-top:14px;
    }

    .mission{
      padding:15px;
      border-radius:18px;
      border:1px solid var(--line);
      background:linear-gradient(180deg, rgba(255,255,255,.74), rgba(246,251,255,.86));
      transition:transform .18s ease, border-color .18s ease, box-shadow .18s ease;
      cursor:pointer;
    }

    .mission:hover,.mission.active{
      transform:translateY(-2px);
      border-color:rgba(46,178,255,.28);
      box-shadow:0 14px 26px rgba(71,123,176,.10);
    }

    .mission.locked{
      opacity:.5;
      cursor:not-allowed;
    }

    .mission-title{
      display:flex;
      justify-content:space-between;
      gap:10px;
      align-items:center;
      font-size:15px;
      font-weight:800;
      margin-bottom:7px;
    }

    .screen-stack,.overview-grid,.footer-grid,.response-grid{
      display:grid;
      gap:20px;
    }

    .overview-grid{
      grid-template-columns:1.1fr .9fr;
    }

    .response-grid{
      grid-template-columns:1fr 330px;
      gap:16px;
    }

    .sim-card{
      border-radius:22px;
      border:1px solid var(--line);
      background:linear-gradient(180deg, rgba(255,255,255,.9), rgba(241,248,255,.94));
      padding:18px;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.55);
    }

    .sim-top{
      display:grid;
      grid-template-columns:1fr auto;
      gap:12px;
      align-items:start;
      margin-bottom:16px;
    }

    .mini-badge{
      padding:8px 12px;
      border-radius:999px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.86);
      font-size:12px;
      font-weight:800;
      color:#245071;
      white-space:nowrap;
    }

    .relationship-card{
      padding:16px;
      border-radius:20px;
      border:1px solid var(--line);
      background:linear-gradient(180deg, rgba(255,255,255,.9), rgba(245,250,255,.96));
      margin-bottom:14px;
    }

    .formula{
      display:flex;
      flex-wrap:wrap;
      align-items:center;
      gap:10px;
      margin-top:10px;
      font-size:20px;
      font-weight:900;
      color:#18405f;
    }

    .formula-chip{
      padding:10px 14px;
      border-radius:14px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.86);
      min-width:60px;
      text-align:center;
    }

    .bar-stage{
      padding:16px;
      border-radius:20px;
      border:1px solid var(--line);
      background:linear-gradient(180deg, rgba(255,255,255,.82), rgba(240,248,255,.92));
    }

    .bar-header{
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:end;
      margin-bottom:14px;
    }

    .bar-area{
      position:relative;
      height:260px;
      border-radius:18px;
      border:1px solid rgba(61,124,182,.10);
      background:
        linear-gradient(rgba(22,50,76,.06) 1px, transparent 1px),
        linear-gradient(180deg, rgba(255,255,255,.75), rgba(240,248,255,.88));
      background-size:100% 42px, 100% 100%;
      overflow:hidden;
      padding:14px 14px 18px;
      display:flex;
      align-items:flex-end;
      justify-content:center;
    }

    .bar-column{
      width:min(240px, 48%);
      display:flex;
      flex-direction:column;
      justify-content:end;
      align-items:center;
      height:100%;
      gap:10px;
    }

    .bar{
      width:100%;
      max-width:170px;
      border-radius:18px 18px 10px 10px;
      background:linear-gradient(180deg, rgba(103,226,191,.92), rgba(46,178,255,.92));
      box-shadow:0 16px 28px rgba(71,123,176,.14);
      position:relative;
      transition:height .25s ease;
      border:1px solid rgba(255,255,255,.55);
    }

    .bar::after{
      content:"";
      position:absolute;
      inset:10px 12px auto;
      height:22%;
      border-radius:12px;
      background:linear-gradient(180deg, rgba(255,255,255,.4), rgba(255,255,255,0));
    }

    .bar-value{
      position:absolute;
      top:10px;
      left:50%;
      transform:translateX(-50%);
      font-weight:900;
      color:white;
      text-shadow:0 1px 2px rgba(0,0,0,.18);
      font-size:20px;
    }

    .bar-label{
      font-size:13px;
      font-weight:800;
      color:#3d5f7d;
      text-align:center;
    }

    .bar-scale{
      position:absolute;
      inset:0;
      pointer-events:none;
    }

    .bar-scale span{
      position:absolute;
      left:12px;
      font-size:11px;
      color:#7892ac;
      transform:translateY(50%);
    }

    .control-card,.feedback,.mini-item,.output,.quiz-card,.debrief-card,.insight-card,.future-card,.coach{
      border-radius:20px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.78);
    }

    .control-card{padding:18px}

    .slider-row{
      display:flex;
      justify-content:space-between;
      gap:10px;
      align-items:end;
      margin-bottom:10px;
    }

    .meter{
      margin-top:12px;
      display:grid;
      gap:10px;
    }

    .meter-line{
      position:relative;
      height:10px;
      border-radius:999px;
      background:rgba(46,178,255,.08);
      border:1px solid rgba(46,178,255,.05);
      overflow:hidden;
    }

    .meter-line span{
      display:block;
      height:100%;
      border-radius:999px;
      background:linear-gradient(90deg, var(--accent-2), var(--accent), var(--accent-3));
      box-shadow:0 0 16px rgba(46,178,255,.18);
      transition:width .25s ease;
    }

    input[type="range"]{
      width:100%;
      accent-color:var(--accent);
    }

    .axis{
      display:flex;
      justify-content:space-between;
      color:var(--muted);
      font-size:12px;
      margin-top:6px;
    }

    .output-grid{
      display:grid;
      grid-template-columns:repeat(3, minmax(0,1fr));
      gap:12px;
      margin-top:16px;
    }

    .choice-grid{
      display:grid;
      grid-template-columns:repeat(2, minmax(0,1fr));
      gap:12px;
      margin-top:12px;
    }

    .coach-grid{
      display:grid;
      grid-template-columns:repeat(3, minmax(0,1fr));
      gap:12px;
      margin-top:12px;
    }

    .debrief-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
      margin-top:14px;
    }

    .output{
      padding:14px;
    }

    .output span{
      display:block;
      font-size:11px;
      text-transform:uppercase;
      letter-spacing:.14em;
      color:var(--muted);
    }

    .output strong{
      display:block;
      margin-top:6px;
      font-size:22px;
    }

    .feedback{
      margin-top:16px;
      min-height:66px;
      padding:14px 16px;
      line-height:1.5;
    }

    .feedback.good{
      border-color:rgba(73,207,165,.24);
      background:rgba(103,226,191,.16);
    }

    .feedback.bad{
      border-color:rgba(255,124,151,.24);
      background:rgba(255,124,151,.14);
    }

    .graph{
      margin-top:14px;
      height:300px;
      border-radius:20px;
      border:1px solid rgba(61,124,182,.10);
      background:
        linear-gradient(rgba(22,50,76,.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(22,50,76,.06) 1px, transparent 1px),
        radial-gradient(circle at 60% 20%, rgba(46,178,255,.08), transparent 24%),
        linear-gradient(180deg, rgba(255,255,255,.74), rgba(244,250,255,.80));
      background-size:36px 36px, 36px 36px, 100% 100%, 100% 100%;
      overflow:hidden;
    }

    .graph svg{width:100%;height:100%}

    .graph-legend{
      display:flex;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
      margin-top:10px;
      color:var(--muted);
      font-size:12px;
    }

    .status-pill{
      padding:8px 12px;
      border-radius:999px;
      border:1px solid rgba(61,124,182,.12);
      background:rgba(255,255,255,.72);
      font-size:12px;
      font-weight:800;
      color:#245071;
    }

    .mini-list{
      display:grid;
      gap:10px;
      margin-top:14px;
    }

    .mini-item,.debrief-card,.insight-card,.future-card,.quiz-card{padding:16px}

    .mini-item strong,.debrief-card strong{display:block;margin-bottom:5px}

    .mission-complete{
      position:relative;
      overflow:hidden;
      padding:18px;
      border-radius:22px;
      border:1px solid rgba(73,207,165,.24);
      background:linear-gradient(135deg, rgba(103,226,191,.16), rgba(46,178,255,.10));
      box-shadow:0 14px 28px rgba(71,123,176,.10);
    }

    .confetti{
      position:absolute;
      inset:0;
      pointer-events:none;
      overflow:hidden;
    }

    .confetti span{
      position:absolute;
      top:-12px;
      width:10px;
      height:18px;
      border-radius:999px;
      opacity:.82;
      animation:confettiFall linear infinite;
    }

    .coach{
      padding:13px;
    }

    .coach b{
      display:block;
      margin-bottom:4px;
    }

    .tag{
      padding:8px 11px;
      font-size:12px;
      font-weight:800;
      color:#245071;
      background:rgba(255,255,255,.78);
    }

    button{
      border:0;
      cursor:pointer;
      padding:13px 16px;
      border-radius:16px;
      font:800 14px var(--font-ui);
      color:var(--text);
      background:linear-gradient(145deg, rgba(46,178,255,.14), rgba(103,226,191,.16));
      border:1px solid rgba(61,124,182,.12);
      box-shadow:0 12px 24px rgba(71,123,176,.08);
      transition:transform .18s ease, box-shadow .18s ease, opacity .18s ease;
    }

    button:hover:not(:disabled){
      transform:translateY(-2px);
      box-shadow:0 16px 28px rgba(71,123,176,.12);
    }

    button:disabled{
      opacity:.54;
      cursor:not-allowed;
    }

    .primary{background:linear-gradient(145deg, rgba(103,226,191,.22), rgba(46,178,255,.22))}
    .ghost{background:rgba(255,255,255,.84)}
    .danger{background:linear-gradient(145deg, rgba(255,124,151,.18), rgba(255,214,111,.14))}
    .choice.correct{
      border-color:rgba(73,207,165,.28);
      background:rgba(103,226,191,.20);
    }
    .choice.wrong{
      border-color:rgba(255,124,151,.24);
      background:rgba(255,124,151,.18);
    }

    .sr-only{
      position:absolute;
      width:1px;
      height:1px;
      padding:0;
      margin:-1px;
      overflow:hidden;
      clip:rect(0,0,0,0);
      white-space:nowrap;
      border:0;
    }

    @keyframes floatCard{
      0%,100%{transform:perspective(1000px) rotateY(-22deg) rotateX(10deg) translateY(0)}
      50%{transform:perspective(1000px) rotateY(-18deg) rotateX(7deg) translateY(-8px)}
    }

    @keyframes confettiFall{
      0%{transform:translateY(0) rotate(0);opacity:0}
      10%{opacity:1}
      100%{transform:translateY(240px) rotate(240deg);opacity:0}
    }

    @media (max-width:1180px){
      .hero-grid,.main-grid,.overview-grid,.response-grid,.footer-grid,.system-bar,.coach-grid,.debrief-grid{
        grid-template-columns:1fr;
      }
      .sidebar{position:static}
    }

    @media (max-width:760px){
      .app{width:min(100% - 16px, 1360px)}
      .hero{padding:18px}
      h1{font-size:48px}
      .choice-grid,.output-grid{grid-template-columns:1fr}
      .bar-column{width:70%}
    }
  </style>
</head>
<body>
  <div id="liveRegion" class="sr-only" aria-live="polite" aria-atomic="true"></div>
  <main class="app" id="app"></main>

  <script>
    "use strict";

    const STORAGE_KEY = "variable-city-simple-relationship-v1";

    const MISSIONS = [
      {
        id:"garden-grow",
        district:"Growth Lab",
        title:"Plant Growth Test",
        description:"Change the number of light units and watch plant height follow a simple rule.",
        independentLabel:"Light units",
        dependentLabel:"Plant height",
        unitIndependent:"units",
        unitDependent:"cm",
        min:1,
        max:5,
        step:1,
        rule:(x) => x * 5,
        equation:"y = 5x",
        narrative:"The scientist wants a clean pattern. Every 1 light unit adds 5 centimeters of plant height.",
        prompts:[
          "What stayed in your control during this experiment?",
          "How does the graph prove that the output depends on the input?"
        ],
        quiz:[
          {id:"q1",prompt:"Which variable is independent?",choices:["Light units","Plant height","Both are independent","Neither"],answer:0,explain:"The independent variable is the one you control on purpose."},
          {id:"q2",prompt:"If light units go from 2 to 4, what happens to the plant height?",choices:["It stays the same","It increases","It becomes the input","It disappears"],answer:1,explain:"The output increases because the relationship is y = 5x."}
        ]
      },
      {
        id:"ticket-machine",
        district:"Ticket Station",
        title:"Ticket Machine Output",
        description:"Change the number of ticket buttons pressed and watch tickets printed follow the rule.",
        independentLabel:"Buttons pressed",
        dependentLabel:"Tickets printed",
        unitIndependent:"presses",
        unitDependent:"tickets",
        min:1,
        max:5,
        step:1,
        rule:(x) => x * 3,
        equation:"y = 3x",
        narrative:"Each button press prints 3 tickets. Your job is to spot the cause and the effect.",
        prompts:[
          "Which variable was the cause in this machine?",
          "Why are tickets printed the dependent variable?"
        ],
        quiz:[
          {id:"q1",prompt:"Which variable is dependent?",choices:["Buttons pressed","Tickets printed","Both","Neither"],answer:1,explain:"Tickets printed change because buttons pressed change."},
          {id:"q2",prompt:"What is the output when the input is 5?",choices:["5","8","15","20"],answer:2,explain:"The relationship is y = 3x, so 5 presses print 15 tickets."}
        ]
      },
      {
        id:"water-fill",
        district:"Water Works",
        title:"Tank Fill Rate",
        description:"Change the number of minutes and watch the tank fill with a simple pattern.",
        independentLabel:"Minutes",
        dependentLabel:"Liters filled",
        unitIndependent:"min",
        unitDependent:"L",
        min:1,
        max:5,
        step:1,
        rule:(x) => x * 4,
        equation:"y = 4x",
        narrative:"The tank fills at 4 liters every minute. Use the slider to see the input-output pattern.",
        prompts:[
          "What did you control in this situation?",
          "What changes because the minutes change?"
        ],
        quiz:[
          {id:"q1",prompt:"What is the independent variable?",choices:["Liters filled","Minutes","Both","Neither"],answer:1,explain:"Minutes are the input that you choose."},
          {id:"q2",prompt:"If the tank runs for 3 minutes, how many liters fill?",choices:["7","12","15","20"],answer:1,explain:"The relationship is y = 4x, so 3 minutes gives 12 liters."}
        ]
      }
    ];

    const FUTURE_NODES = [
      "Add teacher dashboard export",
      "Swap in new standards with the same engine",
      "Extend from bars to tables and proportional graphs"
    ];

    const state = {
      selectedMissionId: MISSIONS[0].id,
      sliderValue: MISSIONS[0].min,
      answers: {},
      stars: 0,
      mastery: 0,
      completed: {},
      discussionDone: {},
      totalCorrect: 0,
      level: 1,
      message: "Move the slider to change the input and watch the output update.",
      messageTone: ""
    };

    const $ = (s, root=document) => root.querySelector(s);
    const $$ = (s, root=document) => Array.from(root.querySelectorAll(s));

    function announce(text){
      const node = $("#liveRegion");
      node.textContent = "";
      requestAnimationFrame(() => node.textContent = text);
    }

    function loadState(){
      try{
        const raw = localStorage.getItem(STORAGE_KEY);
        if(raw) Object.assign(state, JSON.parse(raw));
      }catch(err){
        console.warn("Load skipped", err);
      }
    }

    function saveState(){
      try{
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      }catch(err){
        console.warn("Save skipped", err);
      }
    }

    function getMission(id){
      return MISSIONS.find(m => m.id === id) || MISSIONS[0];
    }

    function currentMission(){
      return getMission(state.selectedMissionId);
    }

    function computeDependent(mission, independent){
      return mission.rule(independent);
    }

    function missionUnlocked(index){
      return index === 0 || Object.keys(state.completed).length >= index;
    }

    function missionProgress(){
      return Math.round((Object.keys(state.completed).length / MISSIONS.length) * 100);
    }

    function nextMission(){
      const i = MISSIONS.findIndex(m => m.id === state.selectedMissionId);
      return MISSIONS[i + 1] || null;
    }

    function currentOutputs(){
      const mission = currentMission();
      const independent = Number(state.sliderValue);
      const dependent = computeDependent(mission, independent);
      const rangePct = ((independent - mission.min) / Math.max(mission.max - mission.min, 1)) * 100;
      const efficiency = Number((dependent / Math.max(independent, 1)).toFixed(1));
      const energy = Math.round(20 + rangePct * .8);
      return { mission, independent, dependent, rangePct, efficiency, energy };
    }

    function updateLevel(){
      state.level = Math.max(1, Math.floor(state.stars / 60) + 1);
    }

    function selectMission(id){
      state.selectedMissionId = id;
      state.sliderValue = currentMission().min;
      state.message = currentMission().narrative;
      state.messageTone = "";
      saveState();
      render();
      announce(currentMission().title + " loaded");
    }

    function updateSlider(value){
      state.sliderValue = Number(value);
      const { mission, independent, dependent } = currentOutputs();
      state.message = `${mission.independentLabel} is ${independent} ${mission.unitIndependent}. ${mission.dependentLabel} is now ${dependent} ${mission.unitDependent}.`;
      state.messageTone = "";
      saveState();
      render();
    }

    function answerQuestion(questionIndex, answerIndex){
      const mission = currentMission();
      const q = mission.quiz[questionIndex];
      const key = mission.id + ":" + q.id;
      if(state.answers[key] != null) return;

      state.answers[key] = answerIndex;
      if(answerIndex === q.answer){
        state.totalCorrect += 1;
        state.stars += 18;
        state.mastery = Math.min(100, state.mastery + 12);
        state.message = "Correct. " + q.explain;
        state.messageTone = "good";
      }else{
        state.mastery = Math.max(0, state.mastery - 4);
        state.message = "Not quite. " + q.explain;
        state.messageTone = "bad";
      }

      const allAnswered = mission.quiz.every(item => state.answers[mission.id + ":" + item.id] != null);
      const allCorrect = mission.quiz.every(item => state.answers[mission.id + ":" + item.id] === item.answer);

      if(allAnswered && allCorrect && !state.completed[mission.id]){
        state.completed[mission.id] = true;
        state.stars += 40;
        state.mastery = Math.min(100, state.mastery + 16);
        state.message = `${mission.title} complete. ${mission.district} is stabilized and the next district is unlocked.`;
        state.messageTone = "good";
      }

      updateLevel();
      saveState();
      render();
    }

    function answeredAllCorrect(mission){
      return mission.quiz.every(item => state.answers[mission.id + ":" + item.id] === item.answer);
    }

    function discussionUnlocked(mission){
      return answeredAllCorrect(mission);
    }

    function markDiscussionDone(){
      const mission = currentMission();
      state.discussionDone[mission.id] = true;
      state.stars += 8;
      state.mastery = Math.min(100, state.mastery + 4);
      state.message = "Debrief complete. You explained the relationship clearly.";
      state.messageTone = "good";
      updateLevel();
      saveState();
      render();
    }

    function resetProgress(){
      state.selectedMissionId = MISSIONS[0].id;
      state.sliderValue = MISSIONS[0].min;
      state.answers = {};
      state.stars = 0;
      state.mastery = 0;
      state.completed = {};
      state.discussionDone = {};
      state.totalCorrect = 0;
      state.level = 1;
      state.message = "Progress reset. Start again from the first district.";
      state.messageTone = "";
      saveState();
      render();
    }

    function graphData(mission){
      const xs = [];
      for(let x = mission.min; x <= mission.max; x += mission.step) xs.push(x);
      const ys = xs.map(x => computeDependent(mission, x));
      const minY = 0;
      const maxY = Math.max(...ys);
      const left = 44;
      const bottom = 242;
      const usableW = 334;
      const usableH = 188;

      const points = xs.map((x, index) => {
        const y = ys[index];
        const px = left + (index / Math.max(xs.length - 1, 1)) * usableW;
        const py = bottom - ((y - minY) / Math.max(maxY - minY, 1)) * usableH;
        return { x, y, px, py };
      });

      return {
        xs, ys, minY, maxY, left, bottom, usableW, usableH, points,
        path: points.map((p, i) => (i ? "L" : "M") + p.px.toFixed(1) + " " + p.py.toFixed(1)).join(" ")
      };
    }

    function currentGraphDot(mission){
      const data = graphData(mission);
      return data.points.find(p => p.x === Number(state.sliderValue)) || data.points[0];
    }

    function confettiMarkup(){
      const colors = ["#2eb2ff","#67e2bf","#ffd66f","#ff7c97"];
      return Array.from({length:20}, (_, i) => {
        const left = 4 + i * 4.6;
        const color = colors[i % colors.length];
        const delay = (i * .16).toFixed(2);
        const duration = (3.1 + (i % 4) * .42).toFixed(2);
        return `<span style="left:${left}%;background:${color};animation-delay:${delay}s;animation-duration:${duration}s"></span>`;
      }).join("");
    }

    function render(){
      const root = $("#app");
      const mission = currentMission();
      const { independent, dependent, efficiency, energy } = currentOutputs();
      const progress = missionProgress();
      const dot = currentGraphDot(mission);
      const graph = graphData(mission);
      const missionCleared = !!state.completed[mission.id];
      const upcomingMission = nextMission();
      const debriefReady = discussionUnlocked(mission);
      const debriefDone = !!state.discussionDone[mission.id];
      const barHeight = 32 + (dependent / graph.maxY) * 178;

      root.innerHTML = `
        <section class="hero">
          <div class="hero-grid">
            <div>
              <div class="eyebrow">Input → output learning game</div>
              <h1>Variable City</h1>
              <p class="hero-copy">A clean, stronger version: move one control bar, watch the output bar change, and see the graph update instantly. The relationship is simple, visible, and easy for students to explain.</p>
              <div class="hero-actions">
                <button class="primary" id="enterMissionBtn">Open ${mission.district}</button>
                <button class="ghost" id="focusGraphBtn">Focus Graph</button>
                <button class="danger" id="resetBtn">Reset</button>
              </div>
            </div>

            <div class="hero-stats">
              <div class="stat">
                <div class="stat-label">Mastery</div>
                <span class="stat-value">${state.mastery}%</span>
              </div>
              <div class="stat">
                <div class="stat-label">Stars</div>
                <span class="stat-value">${state.stars}</span>
              </div>
              <div class="stat">
                <div class="stat-label">Level</div>
                <span class="stat-value">${state.level}</span>
              </div>
              <div style="flex-basis:100%">
                <div class="progress-shell"><div class="progress-fill" style="width:${progress}%"></div></div>
                <div class="small" style="margin-top:8px">Campaign completion ${progress}%</div>
              </div>
            </div>
          </div>

          <div class="system-bar">
            <div class="system-card">
              <strong>1. Change the input</strong>
              Use the slider to control the independent variable.
            </div>
            <div class="system-card">
              <strong>2. Watch the output respond</strong>
              The bar and graph update at the same time.
            </div>
            <div class="system-card">
              <strong>3. Explain the pattern</strong>
              Use the concept check and debrief to lock it in.
            </div>
          </div>
        </section>

        <section class="main-grid">
          <aside class="sidebar">
            <section class="panel">
              <div class="panel-inner">
                <h3>Mission Select</h3>
                <div class="small">Each district uses a simple rule so students can focus on the relationship between input and output.</div>
                <div class="mission-list">
                  ${MISSIONS.map((item, index) => `
                    <article class="mission ${item.id === mission.id ? "active" : ""} ${missionUnlocked(index) ? "" : "locked"}" data-mission="${item.id}">
                      <div class="mission-title">
                        <span>${item.title}</span>
                        <span>${state.completed[item.id] ? (state.discussionDone[item.id] ? "Mastered" : "Cleared") : missionUnlocked(index) ? "Ready" : "Locked"}</span>
                      </div>
                      <div class="small">${item.description}</div>
                    </article>
                  `).join("")}
                </div>
              </div>
            </section>

            <section class="panel">
              <div class="panel-inner">
                <h3>Memory Lock</h3>
                <div class="mini-list">
                  <div class="mini-item"><strong>Independent variable</strong>You change it. It is the input or cause.</div>
                  <div class="mini-item"><strong>Dependent variable</strong>It responds. It is the output or effect.</div>
                  <div class="mini-item"><strong>Key idea</strong>When the input changes, the output changes in a predictable way.</div>
                </div>
              </div>
            </section>

            <section class="panel">
              <div class="panel-inner">
                <h3>System Status</h3>
                <div class="status-row">
                  <div class="status-pill">Districts ${Object.keys(state.completed).length}/${MISSIONS.length}</div>
                  <div class="status-pill">Correct ${state.totalCorrect}</div>
                  <div class="status-pill">Debriefs ${Object.keys(state.discussionDone).length}</div>
                </div>
                <div class="meter">
                  <div>
                    <div class="small">Energy</div>
                    <div class="meter-line"><span style="width:${energy}%"></span></div>
                  </div>
                  <div>
                    <div class="small">Concept stability</div>
                    <div class="meter-line"><span style="width:${Math.max(10,state.mastery)}%"></span></div>
                  </div>
                </div>
              </div>
            </section>
          </aside>

          <section class="screen-stack">
            <section class="overview-grid">
              <section class="panel">
                <div class="panel-inner">
                  <h2>${mission.title}</h2>
                  <div class="small">${mission.narrative}</div>

                  ${missionCleared ? `
                    <div class="mission-complete" style="margin-top:16px">
                      <div class="confetti">${confettiMarkup()}</div>
                      <h3>District Cleared</h3>
                      <div class="small">
                        ${mission.district} is complete. ${debriefDone ? "Reflection complete and knowledge locked." : "Finish the debrief to convert this clear into full mastery."}
                        ${upcomingMission ? " Next stop: " + upcomingMission.district + "." : " Final district complete."}
                      </div>
                      <div class="footer-tags" style="margin-top:12px">
                        <span class="tag">+40 stars</span>
                        <span class="tag">Mastery boosted</span>
                        <span class="tag">${upcomingMission ? "Next district unlocked" : "Campaign complete"}</span>
                      </div>
                    </div>
                  ` : ""}

                  <div class="response-grid" style="margin-top:16px">
                    <div class="sim-card" id="simCard">
                      <div class="sim-top">
                        <div>
                          <h3 style="margin-bottom:6px">Live Relationship Model</h3>
                          <div class="small">This district follows the rule <strong>${mission.equation}</strong>.</div>
                        </div>
                        <div class="mini-badge">Current pair: (${independent}, ${dependent})</div>
                      </div>

                      <div class="relationship-card">
                        <div class="small">Equation</div>
                        <div class="formula">
                          <span class="formula-chip">x = ${independent}</span>
                          <span>→</span>
                          <span class="formula-chip">${mission.equation}</span>
                          <span>→</span>
                          <span class="formula-chip">y = ${dependent}</span>
                        </div>
                      </div>

                      <div class="bar-stage">
                        <div class="bar-header">
                          <div>
                            <div class="small">Visual response</div>
                            <strong style="font-size:22px">Input bar changes the output bar</strong>
                          </div>
                          <div class="tag">Rule: ${mission.equation}</div>
                        </div>

                        <div class="bar-area">
                          <div class="bar-scale">
                            ${[0, graph.maxY * .25, graph.maxY * .5, graph.maxY * .75, graph.maxY].map((v, i) => {
                              const bottom = 14 + (i * 42);
                              return `<span style="bottom:${bottom}px">${Math.round(v)}</span>`;
                            }).join("")}
                          </div>

                          <div class="bar-column">
                            <div class="bar" style="height:${32 + independent * 26}px; background:linear-gradient(180deg, rgba(255,214,111,.92), rgba(46,178,255,.92));">
                              <div class="bar-value">${independent}</div>
                            </div>
                            <div class="bar-label">${mission.independentLabel}<br><span class="small">${mission.unitIndependent}</span></div>
                          </div>

                          <div class="bar-column">
                            <div class="bar" style="height:${barHeight}px;">
                              <div class="bar-value">${dependent}</div>
                            </div>
                            <div class="bar-label">${mission.dependentLabel}<br><span class="small">${mission.unitDependent}</span></div>
                          </div>
                        </div>
                      </div>
                    </div>

                    <div class="control-card">
                      <h3>Experiment Control</h3>
                      <div class="small">Move the slider to change the independent variable. The dependent variable will update automatically.</div>

                      <div style="margin-top:16px">
                        <div class="slider-row">
                          <div>
                            <div class="tag">${mission.independentLabel}</div>
                            <strong style="font-size:30px">${independent} ${mission.unitIndependent}</strong>
                          </div>
                          <div style="text-align:right">
                            <div class="tag">${mission.dependentLabel}</div>
                            <strong style="font-size:30px">${dependent} ${mission.unitDependent}</strong>
                          </div>
                        </div>

                        <input id="variableSlider" type="range" min="${mission.min}" max="${mission.max}" step="${mission.step}" value="${independent}" />
                        <div class="axis">
                          <span>${mission.min} ${mission.unitIndependent}</span>
                          <span>${mission.max} ${mission.unitIndependent}</span>
                        </div>
                      </div>

                      <div class="output-grid">
                        <div class="output">
                          <span>Input type</span>
                          <strong>Independent</strong>
                        </div>
                        <div class="output">
                          <span>Output type</span>
                          <strong>Dependent</strong>
                        </div>
                        <div class="output">
                          <span>Rate</span>
                          <strong>${efficiency}</strong>
                        </div>
                      </div>

                      <div class="coach-grid">
                        <div class="coach">
                          <b>Notice</b>
                          What changed when you moved the slider?
                        </div>
                        <div class="coach">
                          <b>Name it</b>
                          Which variable was the cause?
                        </div>
                        <div class="coach">
                          <b>Explain</b>
                          How do the bar and graph prove it?
                        </div>
                      </div>

                      <div class="feedback ${state.messageTone}">${state.message}</div>
                    </div>
                  </div>
                </div>
              </section>

              <section class="panel" id="graphPanel">
                <div class="panel-inner">
                  <h3>Reaction Graph</h3>
                  <div class="small">The highlighted point shows the exact input-output pair from the slider.</div>

                  <div class="graph">
                    <svg viewBox="0 0 420 300" role="img" aria-label="Mission graph">
                      <defs>
                        <linearGradient id="lineGlow" x1="0%" y1="0%" x2="100%" y2="0%">
                          <stop offset="0%" stop-color="#67e2bf"></stop>
                          <stop offset="52%" stop-color="#2eb2ff"></stop>
                          <stop offset="100%" stop-color="#ffd66f"></stop>
                        </linearGradient>
                        <filter id="softGlow">
                          <feGaussianBlur stdDeviation="4" result="blur"></feGaussianBlur>
                          <feMerge>
                            <feMergeNode in="blur"></feMergeNode>
                            <feMergeNode in="SourceGraphic"></feMergeNode>
                          </feMerge>
                        </filter>
                      </defs>

                      <line x1="${graph.left}" y1="${graph.bottom}" x2="${graph.left + graph.usableW}" y2="${graph.bottom}" stroke="rgba(22,50,76,.45)" stroke-width="2"></line>
                      <line x1="${graph.left}" y1="34" x2="${graph.left}" y2="${graph.bottom}" stroke="rgba(22,50,76,.45)" stroke-width="2"></line>

                      ${graph.points.map((p) => `
                        <line x1="${p.px}" y1="${graph.bottom}" x2="${p.px}" y2="${graph.bottom + 8}" stroke="rgba(22,50,76,.28)" stroke-width="1.5"></line>
                        <text x="${p.px}" y="${graph.bottom + 24}" fill="#6b87a1" font-size="12" text-anchor="middle">${p.x}</text>
                      `).join("")}

                      ${Array.from({length:6}, (_, i) => {
                        const val = (graph.maxY / 5) * i;
                        const y = graph.bottom - ((val - graph.minY) / Math.max(graph.maxY - graph.minY, 1)) * graph.usableH;
                        return `
                          <line x1="${graph.left - 6}" y1="${y}" x2="${graph.left + graph.usableW}" y2="${y}" stroke="rgba(22,50,76,.08)" stroke-width="1"></line>
                          <text x="${graph.left - 10}" y="${y + 4}" fill="#6b87a1" font-size="12" text-anchor="end">${Math.round(val)}</text>
                        `;
                      }).join("")}

                      <path d="${graph.path}" fill="none" stroke="url(#lineGlow)" stroke-width="5" stroke-linecap="round" filter="url(#softGlow)"></path>

                      ${graph.points.map(p => `
                        <circle cx="${p.px}" cy="${p.py}" r="5.2" fill="#ffffff" opacity=".92"></circle>
                      `).join("")}

                      <line x1="${dot.px}" y1="${dot.py}" x2="${dot.px}" y2="${graph.bottom}" stroke="rgba(255,214,111,.32)" stroke-width="2" stroke-dasharray="5 5"></line>
                      <line x1="${graph.left}" y1="${dot.py}" x2="${dot.px}" y2="${dot.py}" stroke="rgba(103,226,191,.30)" stroke-width="2" stroke-dasharray="5 5"></line>
                      <circle cx="${dot.px}" cy="${dot.py}" r="11" fill="rgba(255,214,111,.18)"></circle>
                      <circle cx="${dot.px}" cy="${dot.py}" r="7.2" fill="#ffd66f" stroke="#fff6cf" stroke-width="2"></circle>

                      <rect x="${Math.min(dot.px + 12, 254)}" y="${Math.max(dot.py - 40, 26)}" rx="12" ry="12" width="132" height="42" fill="rgba(255,255,255,.88)" stroke="rgba(61,124,182,.10)"></rect>
                      <text x="${Math.min(dot.px + 24, 266)}" y="${Math.max(dot.py - 22, 44)}" fill="#245071" font-size="12">x = ${dot.x}</text>
                      <text x="${Math.min(dot.px + 24, 266)}" y="${Math.max(dot.py - 8, 58)}" fill="#245071" font-size="12">y = ${dot.y}</text>

                      <text x="${graph.left + graph.usableW / 2}" y="288" fill="#6b87a1" font-size="13" text-anchor="middle">${mission.independentLabel}</text>
                      <text x="-150" y="18" fill="#6b87a1" font-size="13" text-anchor="middle" transform="rotate(-90)">${mission.dependentLabel}</text>
                    </svg>
                  </div>

                  <div class="graph-legend">
                    <span>Current point: <b style="color:#c69200">${dot.x}, ${dot.y}</b></span>
                    <span>Rule: <b>${mission.equation}</b></span>
                    <span>X-axis = independent, Y-axis = dependent</span>
                  </div>

                  <div class="quiz-card" style="margin-top:18px">
                    <h3>Concept Check</h3>
                    ${mission.quiz.map((question, questionIndex) => {
                      const key = mission.id + ":" + question.id;
                      const answered = state.answers[key];
                      const correct = answered === question.answer;
                      return `
                        <div style="margin-top:${questionIndex ? 18 : 0}px">
                          <h4>${questionIndex + 1}. ${question.prompt}</h4>
                          <div class="choice-grid">
                            ${question.choices.map((choice, answerIndex) => {
                              const cls = answered == null ? "choice" : answerIndex === question.answer ? "choice correct" : answered === answerIndex ? "choice wrong" : "choice";
                              return `<button class="${cls}" data-question="${questionIndex}" data-answer="${answerIndex}" ${answered != null ? "disabled" : ""}>${choice}</button>`;
                            }).join("")}
                          </div>
                          <div class="small" style="margin-top:8px">
                            ${answered == null ? "Pick the best answer." : correct ? "Answered correctly." : "Answered. Review the feedback panel, bars, and graph."}
                          </div>
                        </div>
                      `;
                    }).join("")}
                  </div>

                  <div class="debrief-card" style="margin-top:18px">
                    <h3>Discussion Debrief</h3>
                    <div class="small">After the concept check, explain the relationship aloud or with a partner.</div>
                    <div class="debrief-grid">
                      <div class="mini-item"><strong>Talk prompt 1</strong>${mission.prompts[0]}</div>
                      <div class="mini-item"><strong>Talk prompt 2</strong>${mission.prompts[1]}</div>
                    </div>
                    <div style="margin-top:14px;display:flex;gap:12px;align-items:center;flex-wrap:wrap">
                      <button id="discussionBtn" class="primary" ${debriefReady && !debriefDone ? "" : "disabled"}>${debriefDone ? "Debrief Complete" : "Mark Discussion Complete"}</button>
                      <div class="small">${debriefReady ? (debriefDone ? "Reflection points already awarded." : "Unlocks after both concept checks are correct.") : "Get both concept checks correct to unlock the debrief reward."}</div>
                    </div>
                  </div>
                </div>
              </section>
            </section>

            <section class="footer-grid">
              <section class="panel">
                <div class="panel-inner">
                  <h3>Mission Insight</h3>
                  <div class="insight-card">
                    <div class="footer-tags">
                      <span class="tag">Independent = input</span>
                      <span class="tag">Dependent = output</span>
                      <span class="tag">Bars + graph = evidence</span>
                    </div>
                    <div class="mini-list">
                      <div class="mini-item"><strong>What you controlled</strong>${mission.independentLabel} was changed on purpose.</div>
                      <div class="mini-item"><strong>What reacted</strong>${mission.dependentLabel} changed because the independent variable changed.</div>
                      <div class="mini-item"><strong>How to explain it</strong>Say: “When x changed, y changed according to ${mission.equation}.”</div>
                    </div>
                  </div>
                </div>
              </section>

              <section class="panel">
                <div class="panel-inner">
                  <h3>Expansion Path</h3>
                  <div class="future-card">
                    <div class="small">This version is intentionally cleaner and more teachable, while still being ready to grow.</div>
                    <div class="footer-tags" style="margin-top:12px">
                      <span class="tag">Simple visual engine</span>
                      <span class="tag">Touch + mouse ready</span>
                      <span class="tag">Reusable for other standards</span>
                    </div>
                    <div class="mini-list">
                      ${FUTURE_NODES.map(item => `<div class="mini-item"><strong>Roadmap node</strong>${item}</div>`).join("")}
                    </div>
                  </div>
                </div>
              </section>
            </section>
          </section>
        </section>
      `;

      bindEvents();
      saveState();
    }

    function bindEvents(){
      const slider = $("#variableSlider");
      if(slider) slider.addEventListener("input", e => updateSlider(e.target.value));

      const reset = $("#resetBtn");
      if(reset) reset.addEventListener("click", resetProgress);

      const enter = $("#enterMissionBtn");
      if(enter) enter.addEventListener("click", () => {
        const sim = $("#simCard");
        if(sim) sim.scrollIntoView({behavior:"smooth", block:"center"});
      });

      const focusGraphBtn = $("#focusGraphBtn");
      if(focusGraphBtn) focusGraphBtn.addEventListener("click", () => {
        const panel = $("#graphPanel");
        if(panel) panel.scrollIntoView({behavior:"smooth", block:"center"});
      });

      const discussionBtn = $("#discussionBtn");
      if(discussionBtn) discussionBtn.addEventListener("click", markDiscussionDone);

      $$(".mission").forEach((node, index) => {
        node.addEventListener("click", () => {
          if(!missionUnlocked(index)) return;
          selectMission(node.dataset.mission);
        });
      });

      $$("[data-question]").forEach(node => {
        node.addEventListener("click", () => {
          answerQuestion(Number(node.dataset.question), Number(node.dataset.answer));
        });
      });
    }

    loadState();
    updateLevel();
    render();
  </script>
</body>
</html>
